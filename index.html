<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Doces</title>
    
    <!-- Bibliotecas essenciais: React, ReactDOM, Babel (para ler o código) e Tailwind (para o design) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-indigo-100">
    
    <!-- Onde a aplicação vai ser desenhada -->
    <div id="root"></div>

    <!-- O Código da Aplicação -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Ícones embutidos para não depender de pacotes complexos e garantir que carregam offline
        const ICONS = {
            store: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>`,
            users: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            candy: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.5 7.5-2 2a4.95 4.95 0 1 0 7 7l2-2a4.95 4.95 0 1 0-7-7Z"/><path d="M14 6.5v10"/><path d="M10 7.5v10"/><path d="m16 7 1-5 1.36.68A3 3 0 0 0 19.7 3h.3v.3a3 3 0 0 0-.68 1.34L20 6l-4 1Z"/><path d="m8 17-1 5-1.36-.68A3 3 0 0 0 4.3 21H4v-.3a3 3 0 0 0 .68-1.34L4 18l4-1Z"/></svg>`,
            history: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`,
            receipt: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></svg>`,
            'layout-dashboard': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>`,
            wallet: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>`,
            'shopping-cart': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`,
            phone: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
            'trash-2': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`,
            plus: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
            x: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            'check-circle-2': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
            'edit-2': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`,
            download: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>`,
            upload: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>`,
            'alert-circle': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`,
            'chevron-down': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            'chevron-up': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`,
            'database': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>`
        };

        const Icon = ({ name, className }) => (
            <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: ICONS[name] }} />
        );

        function App() {
            // Inicialização do LocalStorage de forma segura
            const safeLoad = (key) => {
                try { return JSON.parse(localStorage.getItem(key)) || []; } 
                catch (e) { return []; }
            };

            const [clientes, setClientes] = useState(() => safeLoad('g_doces_clientes'));
            const [doces, setDoces] = useState(() => safeLoad('g_doces_produtos'));
            const [vendas, setVendas] = useState(() => safeLoad('g_doces_vendas'));
            const [pagamentos, setPagamentos] = useState(() => safeLoad('g_doces_pagamentos'));
            const [logsPagamentos, setLogsPagamentos] = useState(() => safeLoad('g_doces_logs'));

            // Efeitos para gravar automaticamente ao modificar
            useEffect(() => { localStorage.setItem('g_doces_clientes', JSON.stringify(clientes)); }, [clientes]);
            useEffect(() => { localStorage.setItem('g_doces_produtos', JSON.stringify(doces)); }, [doces]);
            useEffect(() => { localStorage.setItem('g_doces_vendas', JSON.stringify(vendas)); }, [vendas]);
            useEffect(() => { localStorage.setItem('g_doces_pagamentos', JSON.stringify(pagamentos)); }, [pagamentos]);
            useEffect(() => { localStorage.setItem('g_doces_logs', JSON.stringify(logsPagamentos)); }, [logsPagamentos]);

            const [abaAtiva, setAbaAtiva] = useState('resumo'); 
            const [modalVenda, setModalVenda] = useState({ aberto: false, clienteId: null, clienteNome: '' });
            const [doceSelecionado, setDoceSelecionado] = useState('');
            const [erroVenda, setErroVenda] = useState('');
            const [modalPagamento, setModalPagamento] = useState({ aberto: false, clienteId: null, clienteNome: '', totalDevido: 0 });
            const [valorPagamento, setValorPagamento] = useState('');
            const [modalEditaCliente, setModalEditaCliente] = useState({ aberto: false, cliente: null });
            const [modalEditaDoce, setModalEditaDoce] = useState({ aberto: false, doce: null });
            const [clientesExpandidos, setClientesExpandidos] = useState([]);
            
            const [novoCliente, setNovoCliente] = useState({ nome: '', departamento: '', whatsapp: '' });
            const [novoDoce, setNovoDoce] = useState({ nome: '', preco: '', estoque: '' });

            const fileInputRef = useRef(null);

            // Exportar / Importar
            const exportarDados = () => {
                const dados = { clientes, doces, vendas, pagamentos, logsPagamentos };
                const blob = new Blob([JSON.stringify(dados)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_doces_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const importarDados = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const dados = JSON.parse(e.target.result);
                        if (dados.clientes && dados.doces) {
                            if (window.confirm("Atenção: Isto irá substituir os dados atuais. Deseja continuar?")) {
                                setClientes(dados.clientes || []);
                                setDoces(dados.doces || []);
                                setVendas(dados.vendas || []);
                                setPagamentos(dados.pagamentos || []);
                                setLogsPagamentos(dados.logsPagamentos || []);
                                alert("Dados restaurados com sucesso!");
                            }
                        } else { alert("Ficheiro inválido."); }
                    } catch (error) { alert("Erro ao ler o ficheiro."); }
                };
                reader.readAsText(file);
                event.target.value = ''; 
            };

            const gerarId = () => Date.now().toString(36) + Math.random().toString(36).substring(2, 9);

            // Lógica Clientes
            const adicionarCliente = (e) => {
                e.preventDefault();
                if (!novoCliente.nome || !novoCliente.departamento) return;
                setClientes([...clientes, { ...novoCliente, id: gerarId() }]);
                setNovoCliente({ nome: '', departamento: '', whatsapp: '' });
            };

            const atualizarCliente = (e) => {
                e.preventDefault();
                setClientes(clientes.map(c => c.id === modalEditaCliente.cliente.id ? modalEditaCliente.cliente : c));
                setModalEditaCliente({ aberto: false, cliente: null });
            };

            const removerCliente = (id) => {
                if (window.confirm('Apagar cliente e todo o seu histórico de dívidas?')) {
                    setClientes(clientes.filter(c => c.id !== id));
                    setVendas(vendas.filter(v => v.clienteId !== id));
                    setPagamentos(pagamentos.filter(p => p.clienteId !== id));
                }
            };

            const toggleExpandirCliente = (id) => {
                setClientesExpandidos(prev => prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]);
            };

            // Lógica Doces/Estoque
            const adicionarDoce = (e) => {
                e.preventDefault();
                if (!novoDoce.nome || !novoDoce.preco || !novoDoce.estoque) return;
                const precoF = parseFloat(novoDoce.preco.toString().replace(',', '.'));
                const estqF = parseInt(novoDoce.estoque, 10);
                if (isNaN(precoF) || isNaN(estqF)) return;
                setDoces([...doces, { id: gerarId(), nome: novoDoce.nome, preco: precoF, estoque: estqF }]);
                setNovoDoce({ nome: '', preco: '', estoque: '' });
            };

            const atualizarDoce = (e) => {
                e.preventDefault();
                const precoF = parseFloat(modalEditaDoce.doce.preco.toString().replace(',', '.'));
                const estqF = parseInt(modalEditaDoce.doce.estoque, 10);
                if (isNaN(precoF) || isNaN(estqF)) return;
                setDoces(doces.map(d => d.id === modalEditaDoce.doce.id ? { ...modalEditaDoce.doce, preco: precoF, estoque: estqF } : d));
                setModalEditaDoce({ aberto: false, doce: null });
            };

            const removerDoce = (id) => {
                if (window.confirm('Deseja apagar este produto do estoque?')) setDoces(doces.filter(d => d.id !== id));
            };

            // Lógica Vendas
            const registrarVenda = (e) => {
                e.preventDefault();
                setErroVenda('');
                const doce = doces.find(d => d.id === doceSelecionado);
                if (!doce || doce.estoque <= 0) { setErroVenda("Produto esgotado."); return; }
                setDoces(doces.map(d => d.id === doce.id ? { ...d, estoque: d.estoque - 1 } : d));
                setVendas([...vendas, {
                    id: gerarId(), clienteId: modalVenda.clienteId, doceId: doce.id, doceNome: doce.nome, preco: doce.preco,
                    data: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now() 
                }]);
                setModalVenda({ aberto: false, clienteId: null, clienteNome: '' });
                setDoceSelecionado('');
                if (!clientesExpandidos.includes(modalVenda.clienteId)) setClientesExpandidos([...clientesExpandidos, modalVenda.clienteId]);
            };

            const removerVenda = (vendaId, doceId) => {
                if (window.confirm("Cancelar venda e repor a unidade no estoque?")) {
                    setVendas(vendas.filter(v => v.id !== vendaId));
                    if (doceId && doceId !== 'pagamento') setDoces(doces.map(d => d.id === doceId ? { ...d, estoque: d.estoque + 1 } : d));
                }
            };

            // Lógica Pagamentos
            const confirmarPagamento = (e) => {
                e.preventDefault();
                const valorF = parseFloat(valorPagamento.toString().replace(',', '.'));
                if (isNaN(valorF) || valorF <= 0) return;

                setLogsPagamentos([...logsPagamentos, {
                    id: gerarId(), clienteId: modalPagamento.clienteId, clienteNome: modalPagamento.clienteNome, valor: valorF,
                    data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}), timestamp: Date.now()
                }]);

                if (valorF >= modalPagamento.totalDevido - 0.01) {
                    setVendas(vendas.filter(v => v.clienteId !== modalPagamento.clienteId));
                    setPagamentos(pagamentos.filter(p => p.clienteId !== modalPagamento.clienteId));
                } else {
                    setPagamentos([...pagamentos, {
                        id: gerarId(), clienteId: modalPagamento.clienteId, valor: valorF, data: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now()
                    }]);
                }
                setModalPagamento({ aberto: false, clienteId: null, clienteNome: '', totalDevido: 0 });
                setValorPagamento('');
            };

            const removerLogPagamento = (logId) => {
                if (window.confirm("Apagar registo do caixa? (O saldo do cliente não muda)")) {
                    setLogsPagamentos(logsPagamentos.filter(l => l.id !== logId));
                }
            };

            const abrirWhatsapp = (e, numero) => {
                e.stopPropagation();
                let numLimpo = numero.replace(/\D/g, ''); 
                if (numLimpo.length <= 11) numLimpo = '55' + numLimpo; // Indicativo padrão
                window.open(`https://wa.me/${numLimpo}`, '_blank');
            };

            return (
                <div className="min-h-screen relative pb-24">
                    <header className="bg-white pt-10 pb-5 px-6 border-b border-gray-200 sticky top-0 z-10 shadow-sm flex justify-center items-center">
                        <h1 className="text-xl font-extrabold text-indigo-700 uppercase tracking-widest text-center">Gestão de Doces</h1>
                    </header>

                    <main className="p-6 max-w-md mx-auto">
                        
                        {/* ABA: RESUMO */}
                        {abaAtiva === 'resumo' && (
                            <div className="space-y-6">
                                {(() => {
                                    const totalAReceber = clientes.reduce((total, cliente) => {
                                        const compras = vendas.filter(v => v.clienteId === cliente.id).reduce((sum, v) => sum + v.preco, 0);
                                        const pags = pagamentos.filter(p => p.clienteId === cliente.id).reduce((sum, p) => sum + p.valor, 0);
                                        const saldo = compras - pags;
                                        return total + (saldo > 0 ? saldo : 0);
                                    }, 0);

                                    return (
                                        <div className="bg-red-50 p-5 rounded-2xl border border-red-100 flex justify-between items-center shadow-sm">
                                            <div>
                                                <p className="text-[11px] font-bold text-red-500 uppercase tracking-wider mb-1">Saldo a Receber</p>
                                                <p className="text-2xl font-black text-red-600">R$ {totalAReceber.toFixed(2).replace('.', ',')}</p>
                                            </div>
                                            <div className="p-3 bg-white rounded-full shadow-sm">
                                                <Icon name="wallet" className="w-6 h-6 text-red-500" />
                                            </div>
                                        </div>
                                    );
                                })()}
                                <div>
                                    <h3 className="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 px-1 flex items-center">
                                        <Icon name="users" className="w-4 h-4 mr-2 text-indigo-600"/> Contas de Clientes
                                    </h3>
                                    {clientes.length === 0 ? (
                                        <div className="bg-white p-6 rounded-xl border border-gray-200 text-center text-sm text-slate-500 font-medium">Nenhum cliente cadastrado.</div>
                                    ) : (
                                        <div className="space-y-3">
                                            {[...clientes].sort((a, b) => a.nome.localeCompare(b.nome)).map(cliente => {
                                                const comprasDoCliente = vendas.filter(v => v.clienteId === cliente.id).sort((a, b) => b.timestamp - a.timestamp);
                                                const pagamentosDoCliente = pagamentos.filter(p => p.clienteId === cliente.id).sort((a, b) => b.timestamp - a.timestamp);
                                                const saldoDevido = comprasDoCliente.reduce((acc, curr) => acc + curr.preco, 0) - pagamentosDoCliente.reduce((acc, curr) => acc + curr.valor, 0);
                                                const estaExpandido = clientesExpandidos.includes(cliente.id);

                                                return (
                                                    <div key={cliente.id} className="bg-white rounded-xl border border-gray-200 shadow-sm transition-all overflow-hidden hover:border-indigo-300">
                                                        <div className="p-4 flex justify-between items-center cursor-pointer active:bg-gray-50" onClick={() => toggleExpandirCliente(cliente.id)}>
                                                            <div className="flex-1">
                                                                <div className="flex items-center">
                                                                    <h4 className="font-bold text-slate-900 mr-2 text-lg">{cliente.nome}</h4>
                                                                    <Icon name={estaExpandido ? 'chevron-up' : 'chevron-down'} className={`w-[18px] h-[18px] ${estaExpandido ? 'text-indigo-600' : 'text-slate-400'}`} />
                                                                </div>
                                                                <div className="flex items-center space-x-3 mt-1.5">
                                                                    <span className="bg-slate-100 text-slate-600 text-xs px-2 py-0.5 rounded font-medium border border-slate-200">{cliente.departamento}</span>
                                                                    {!estaExpandido && saldoDevido > 0 && <span className="text-xs font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded flex items-center border border-red-100">R$ {saldoDevido.toFixed(2).replace('.', ',')}</span>}
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center space-x-2">
                                                                {cliente.whatsapp && (
                                                                    <button type="button" onClick={(e) => abrirWhatsapp(e, cliente.whatsapp)} className="text-emerald-600 p-2 rounded-lg hover:bg-emerald-50 border border-transparent hover:border-emerald-200">
                                                                        <Icon name="phone" className="w-5 h-5" />
                                                                    </button>
                                                                )}
                                                                {estaExpandido && (
                                                                    <button type="button" onClick={(e) => { e.stopPropagation(); setModalVenda({ aberto: true, clienteId: cliente.id, clienteNome: cliente.nome }); setErroVenda(''); }} className="bg-indigo-50 text-indigo-700 p-2.5 rounded-lg hover:bg-indigo-100 flex items-center active:scale-95 border border-indigo-200">
                                                                        <Icon name="shopping-cart" className="w-5 h-5 mr-1" /><span className="text-xs font-bold">Vender</span>
                                                                    </button>
                                                                )}
                                                            </div>
                                                        </div>
                                                        {estaExpandido && (
                                                            <div className="bg-slate-50 p-4 border-t border-gray-200">
                                                                {comprasDoCliente.length > 0 ? (
                                                                    <div className="space-y-4">
                                                                        <div className="space-y-1">
                                                                            {comprasDoCliente.map(compra => (
                                                                                <div key={compra.id} className="flex justify-between items-center text-sm border-b border-gray-200/60 pb-2 pt-2">
                                                                                    <div className="flex flex-col flex-1"><span className="text-slate-900 font-semibold">{compra.doceNome}</span><span className="text-slate-500 text-[11px]">{compra.data}</span></div>
                                                                                    <div className="flex items-center space-x-3"><span className="font-bold text-slate-800">R$ {compra.preco.toFixed(2).replace('.', ',')}</span><button onClick={() => removerVenda(compra.id, compra.doceId)} className="p-1.5 text-slate-400 hover:text-white hover:bg-red-500 rounded"><Icon name="trash-2" className="w-4 h-4" /></button></div>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                        <div className="flex justify-between items-end pt-4 border-t border-gray-300">
                                                                            <div className="flex flex-col"><span className="text-xs text-slate-500 font-medium">Pendente:</span><span className="text-red-600 text-lg font-black">R$ {saldoDevido.toFixed(2).replace('.', ',')}</span></div>
                                                                            {saldoDevido > 0 && <button onClick={() => { setModalPagamento({ aberto: true, clienteId: cliente.id, clienteNome: cliente.nome, totalDevido: saldoDevido }); setValorPagamento(saldoDevido.toFixed(2)); }} className="flex items-center bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md active:scale-95"><Icon name="wallet" className="w-[18px] h-[18px] mr-1" />Receber</button>}
                                                                        </div>
                                                                    </div>
                                                                ) : <p className="text-sm text-slate-500 text-center py-3 font-medium">Sem dívidas ativas.</p>}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ABA: CLIENTES */}
                        {abaAtiva === 'clientes' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                                    <h2 className="text-lg font-bold text-slate-900 mb-4 flex items-center border-b border-gray-100 pb-3"><Icon name="users" className="w-5 h-5 mr-2 text-indigo-600" /> Novo Cliente</h2>
                                    <form onSubmit={adicionarCliente} className="space-y-4">
                                        <input type="text" placeholder="Nome *" required className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 focus:ring-2 focus:ring-indigo-500 text-sm font-medium" value={novoCliente.nome} onChange={e => setNovoCliente({...novoCliente, nome: e.target.value})} />
                                        <input type="text" placeholder="Departamento *" required className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 focus:ring-2 focus:ring-indigo-500 text-sm font-medium" value={novoCliente.departamento} onChange={e => setNovoCliente({...novoCliente, departamento: e.target.value})} />
                                        <input type="tel" placeholder="WhatsApp (opcional)" className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 focus:ring-2 focus:ring-indigo-500 text-sm font-medium" value={novoCliente.whatsapp} onChange={e => setNovoCliente({...novoCliente, whatsapp: e.target.value})} />
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-3.5 rounded-xl font-bold text-sm flex justify-center items-center shadow-md active:scale-95"><Icon name="plus" className="w-[18px] h-[18px] mr-2" /> Gravar Cliente</button>
                                    </form>
                                </div>
                                <ul className="space-y-3">
                                    {clientes.map(cliente => (
                                        <li key={cliente.id} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center">
                                            <div><p className="font-bold text-slate-900 text-base">{cliente.nome}</p><p className="text-xs text-slate-500 font-medium uppercase mt-0.5">{cliente.departamento}</p></div>
                                            <div className="flex space-x-2"><button onClick={() => setModalEditaCliente({ aberto: true, cliente: { ...cliente } })} className="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg"><Icon name="edit-2" className="w-[18px] h-[18px]" /></button><button onClick={() => removerCliente(cliente.id)} className="p-2.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg"><Icon name="trash-2" className="w-[18px] h-[18px]" /></button></div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        {/* ABA: DOCES */}
                        {abaAtiva === 'doces' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                                    <h2 className="text-lg font-bold text-slate-900 mb-4 flex items-center border-b border-gray-100 pb-3"><Icon name="candy" className="w-5 h-5 mr-2 text-indigo-600" /> Novo Produto</h2>
                                    <form onSubmit={adicionarDoce} className="space-y-4">
                                        <input type="text" placeholder="Nome *" required className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 focus:ring-2 focus:ring-indigo-500 text-sm font-medium" value={novoDoce.nome} onChange={e => setNovoDoce({...novoDoce, nome: e.target.value})} />
                                        <div className="flex space-x-4">
                                            <input type="number" step="0.01" placeholder="Preço *" required className="w-1/2 p-3.5 rounded-xl bg-slate-50 border border-gray-200 focus:ring-2 focus:ring-indigo-500 text-sm font-medium" value={novoDoce.preco} onChange={e => setNovoDoce({...novoDoce, preco: e.target.value})} />
                                            <input type="number" placeholder="Estoque *" required className="w-1/2 p-3.5 rounded-xl bg-slate-50 border border-gray-200 focus:ring-2 focus:ring-indigo-500 text-sm font-medium" value={novoDoce.estoque} onChange={e => setNovoDoce({...novoDoce, estoque: e.target.value})} />
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-3.5 rounded-xl font-bold text-sm flex justify-center items-center shadow-md active:scale-95"><Icon name="plus" className="w-[18px] h-[18px] mr-2" /> Gravar Produto</button>
                                    </form>
                                </div>
                                <ul className="space-y-3">
                                    {doces.map(doce => (
                                        <li key={doce.id} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center">
                                            <div className="flex items-center space-x-4"><div className={`p-3 rounded-xl ${doce.estoque > 0 ? 'bg-indigo-50 text-indigo-600' : 'bg-gray-100 text-gray-400'}`}><Icon name="candy" className="w-6 h-6" /></div><div><p className={`font-bold text-base ${doce.estoque > 0 ? 'text-slate-900' : 'text-slate-400 line-through'}`}>{doce.nome}</p><div className="flex items-center space-x-3 mt-1"><span className="text-sm font-bold text-slate-700">R$ {doce.preco.toFixed(2).replace('.', ',')}</span><span className={`text-[10px] font-bold px-2 py-0.5 rounded ${doce.estoque > 0 ? 'text-emerald-700 bg-emerald-50' : 'text-red-600 bg-red-50'}`}>{doce.estoque > 0 ? `${doce.estoque} un.` : 'Esgotado'}</span></div></div></div>
                                            <div className="flex space-x-2"><button onClick={() => setModalEditaDoce({ aberto: true, doce: { ...doce, preco: doce.preco.toString(), estoque: doce.estoque.toString() } })} className="p-2.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg"><Icon name="edit-2" className="w-[18px] h-[18px]" /></button><button onClick={() => removerDoce(doce.id)} className="p-2.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg"><Icon name="trash-2" className="w-[18px] h-[18px]" /></button></div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        {/* ABA: CAIXA */}
                        {abaAtiva === 'caixa' && (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-br from-emerald-600 to-teal-800 p-8 rounded-2xl shadow-lg text-white text-center relative overflow-hidden">
                                    <div className="absolute -left-6 -bottom-6 w-32 h-32 bg-white rounded-full opacity-10 blur-2xl"></div>
                                    <Icon name="history" className="w-8 h-8 mx-auto mb-3 text-emerald-100" />
                                    <p className="text-emerald-100 text-sm font-bold uppercase tracking-widest mb-1">Total Arrecadado</p>
                                    <p className="text-4xl font-black tracking-tight">R$ {logsPagamentos.reduce((a,c)=>a+c.valor,0).toFixed(2).replace('.',',')}</p>
                                </div>
                                <div className="space-y-3">
                                    {[...logsPagamentos].sort((a, b) => b.timestamp - a.timestamp).map(log => (
                                        <div key={log.id} className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center">
                                            <div className="flex flex-col"><span className="font-bold text-slate-900 text-base">{log.clienteNome}</span><span className="text-[11px] text-slate-500 font-medium">{log.data} às {log.hora || '--:--'}</span></div>
                                            <div className="flex items-center space-x-3"><span className="font-bold text-emerald-600 text-lg">+ R$ {log.valor.toFixed(2).replace('.', ',')}</span><button onClick={() => removerLogPagamento(log.id)} className="p-1.5 text-slate-300 hover:text-white hover:bg-red-500 rounded"><Icon name="trash-2" className="w-4 h-4" /></button></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ABA: BACKUP */}
                        {abaAtiva === 'backup' && (
                            <div className="space-y-6">
                                <div className="bg-indigo-600 p-8 rounded-2xl shadow-lg text-white text-center relative overflow-hidden">
                                    <div className="absolute -left-6 -bottom-6 w-32 h-32 bg-white rounded-full opacity-10 blur-2xl"></div>
                                    <Icon name="database" className="w-10 h-10 mx-auto mb-3 text-indigo-100" />
                                    <h2 className="text-xl font-bold tracking-wide mb-1">Central de Backup</h2>
                                    <p className="text-indigo-200 text-sm font-medium">Proteja os seus dados</p>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                                    <p className="text-sm text-slate-600 font-medium mb-4 text-center">
                                        Como o aplicativo funciona offline, os dados ficam salvos apenas neste navegador. <strong>Faça backups regulares</strong> para não perder as suas informações.
                                    </p>

                                    <button onClick={exportarDados} className="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 p-4 rounded-xl font-bold text-sm flex justify-center items-center transition-colors border border-indigo-100 active:scale-95 shadow-sm">
                                        <Icon name="download" className="w-5 h-5 mr-2" /> Salvar Backup (Exportar)
                                    </button>

                                    <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={importarDados} />
                                    
                                    <button onClick={() => fileInputRef.current.click()} className="w-full bg-slate-50 hover:bg-slate-100 text-slate-700 p-4 rounded-xl font-bold text-sm flex justify-center items-center transition-colors border border-slate-200 active:scale-95 shadow-sm">
                                        <Icon name="upload" className="w-5 h-5 mr-2" /> Restaurar Backup (Importar)
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MENU INFERIOR */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe z-20 shadow-lg">
                        <div className="max-w-md mx-auto flex justify-around items-center p-2">
                            <button onClick={() => setAbaAtiva('resumo')} className={`flex flex-col items-center p-2 transition-colors ${abaAtiva === 'resumo' ? 'text-indigo-600' : 'text-slate-400'}`}><Icon name="layout-dashboard" className="w-6 h-6" /><span className="text-[10px] font-bold mt-1 uppercase">Vendas</span></button>
                            <button onClick={() => setAbaAtiva('clientes')} className={`flex flex-col items-center p-2 transition-colors ${abaAtiva === 'clientes' ? 'text-indigo-600' : 'text-slate-400'}`}><Icon name="users" className="w-6 h-6" /><span className="text-[10px] font-bold mt-1 uppercase">Clientes</span></button>
                            <button onClick={() => setAbaAtiva('doces')} className={`flex flex-col items-center p-2 transition-colors ${abaAtiva === 'doces' ? 'text-indigo-600' : 'text-slate-400'}`}><Icon name="candy" className="w-6 h-6" /><span className="text-[10px] font-bold mt-1 uppercase">Estoque</span></button>
                            <button onClick={() => setAbaAtiva('caixa')} className={`flex flex-col items-center p-2 transition-colors ${abaAtiva === 'caixa' ? 'text-emerald-600' : 'text-slate-400'}`}><Icon name="wallet" className="w-6 h-6" /><span className="text-[10px] font-bold mt-1 uppercase">Caixa</span></button>
                            <button onClick={() => setAbaAtiva('backup')} className={`flex flex-col items-center p-2 transition-colors ${abaAtiva === 'backup' ? 'text-indigo-600' : 'text-slate-400'}`}><Icon name="database" className="w-6 h-6" /><span className="text-[10px] font-bold mt-1 uppercase">Backup</span></button>
                        </div>
                    </nav>

                    {/* MODAIS */}
                    {modalVenda.aberto && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl p-6 w-full max-w-sm"><div className="flex justify-between items-center mb-5 border-b pb-4"><h3 className="text-xl font-bold flex items-center"><Icon name="shopping-cart" className="w-5 h-5 mr-2 text-indigo-600" /> Nova Venda</h3><button onClick={() => setModalVenda({ aberto: false, clienteId: null, clienteNome: '' })} className="text-slate-400 bg-gray-100 p-1.5 rounded-full"><Icon name="x" className="w-5 h-5" /></button></div><form onSubmit={registrarVenda} className="space-y-5"><p className="text-sm font-medium text-slate-600">Cliente: <strong className="text-slate-900">{modalVenda.clienteNome}</strong></p><select className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 outline-none font-medium text-sm" value={doceSelecionado} onChange={(e) => setDoceSelecionado(e.target.value)} required><option value="" disabled>Escolher doce...</option>{doces.map(d => <option key={d.id} value={d.id} disabled={d.estoque <= 0}>{d.nome} - R$ {d.preco.toFixed(2)}</option>)}</select><button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold mt-2">Confirmar Venda</button></form></div></div>
                    )}

                    {modalPagamento.aberto && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl p-6 w-full max-w-sm border-t-8 border-emerald-500"><div className="flex justify-between mb-2"><div className="bg-emerald-100 text-emerald-600 w-14 h-14 rounded-full flex items-center justify-center mb-4"><Icon name="check-circle-2" className="w-[28px] h-[28px]" /></div><button onClick={() => setModalPagamento({ aberto: false, clienteId: null, clienteNome: '', totalDevido: 0 })} className="bg-gray-100 p-1.5 rounded-full"><Icon name="x" className="w-5 h-5" /></button></div><h3 className="text-xl font-black mb-1">Receber Pagamento</h3><p className="text-sm text-slate-500 mb-5">Pendente: <strong className="text-red-600">R$ {modalPagamento.totalDevido.toFixed(2)}</strong></p><form onSubmit={confirmarPagamento}><input type="number" step="0.01" max={modalPagamento.totalDevido} required className="w-full p-3.5 text-2xl font-black rounded-lg bg-gray-50 border border-gray-300 mb-4" value={valorPagamento} onChange={(e) => setValorPagamento(e.target.value)} /><button type="submit" className="w-full bg-emerald-500 text-white p-4 rounded-xl font-bold text-lg">Confirmar</button></form></div></div>
                    )}

                    {modalEditaCliente.aberto && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl p-6 w-full max-w-sm"><div className="flex justify-between items-center mb-5 border-b pb-4"><h3 className="text-lg font-bold flex items-center"><Icon name="edit-2" className="w-5 h-5 mr-2 text-indigo-600"/> Editar Cliente</h3><button onClick={() => setModalEditaCliente({ aberto: false, cliente: null })} className="text-slate-400 bg-gray-100 p-1.5 rounded-full"><Icon name="x" className="w-5 h-5" /></button></div><form onSubmit={atualizarCliente} className="space-y-4"><input type="text" required className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 text-sm font-medium" value={modalEditaCliente.cliente?.nome || ''} onChange={e => setModalEditaCliente({...modalEditaCliente, cliente: {...modalEditaCliente.cliente, nome: e.target.value}})} /><input type="text" required className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 text-sm font-medium" value={modalEditaCliente.cliente?.departamento || ''} onChange={e => setModalEditaCliente({...modalEditaCliente, cliente: {...modalEditaCliente.cliente, departamento: e.target.value}})} /><input type="tel" className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 text-sm font-medium" value={modalEditaCliente.cliente?.whatsapp || ''} onChange={e => setModalEditaCliente({...modalEditaCliente, cliente: {...modalEditaCliente.cliente, whatsapp: e.target.value}})} /><button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-sm mt-2">Salvar</button></form></div></div>
                    )}

                    {modalEditaDoce.aberto && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl p-6 w-full max-w-sm"><div className="flex justify-between items-center mb-5 border-b pb-4"><h3 className="text-lg font-bold flex items-center"><Icon name="edit-2" className="w-5 h-5 mr-2 text-indigo-600" /> Editar Produto</h3><button onClick={() => setModalEditaDoce({ aberto: false, doce: null })} className="text-slate-400 bg-gray-100 p-1.5 rounded-full"><Icon name="x" className="w-5 h-5" /></button></div><form onSubmit={atualizarDoce} className="space-y-4"><input type="text" required className="w-full p-3.5 rounded-xl bg-slate-50 border border-gray-200 text-sm font-medium" value={modalEditaDoce.doce?.nome || ''} onChange={e => setModalEditaDoce({...modalEditaDoce, doce: {...modalEditaDoce.doce, nome: e.target.value}})} /><div className="flex space-x-4"><input type="number" step="0.01" required className="w-1/2 p-3.5 rounded-xl bg-slate-50 border border-gray-200 text-sm font-medium" value={modalEditaDoce.doce?.preco || ''} onChange={e => setModalEditaDoce({...modalEditaDoce, doce: {...modalEditaDoce.doce, preco: e.target.value}})} /><input type="number" required className="w-1/2 p-3.5 rounded-xl bg-slate-50 border border-gray-200 text-sm font-medium" value={modalEditaDoce.doce?.estoque || ''} onChange={e => setModalEditaDoce({...modalEditaDoce, doce: {...modalEditaDoce.doce, estoque: e.target.value}})} /></div><button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-sm mt-2">Salvar</button></form></div></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
