<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Doces</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m9.5 7.5-2 2a4.95 4.95 0 1 0 7 7l2-2a4.95 4.95 0 1 0-7-7Z'/%3E%3Cpath d='M14 6.5v10'/%3E%3Cpath d='M10 7.5v10'/%3E%3Cpath d='m16 7 1-5 1.36.68A3 3 0 0 0 19.7 3h.3v.3a3 3 0 0 0-.68 1.34L20 6l-4 1Z'/%3E%3Cpath d='m8 17-1 5-1.36-.68A3 3 0 0 0 4.3 21H4v-.3a3 3 0 0 0 .68-1.34L4 18l4-1Z'/%3E%3C/svg%3E">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style type="text/tailwindcss">
        @layer base {
            :root, .tema-claro {
                --bg-base: #f8fafc;
                --bg-card: #ffffff;
                --bg-input: #f1f5f9;
                --text-main: #0f172a;
                --text-muted: #64748b;
                --border-color: #e2e8f0;
            }
            .tema-medio {
                --bg-base: #0f172a;
                --bg-card: #1e293b;
                --bg-input: #0f172a;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border-color: #334155;
            }
            .tema-escuro {
                --bg-base: #020617;
                --bg-card: #09090b;
                --bg-input: #020617;
                --text-main: #f8fafc;
                --text-muted: #6b7280;
                --border-color: #1f2937;
            }
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tbase: 'var(--bg-base)',
                        tcard: 'var(--bg-card)',
                        tinput: 'var(--bg-input)',
                        tmain: 'var(--text-main)',
                        tmuted: 'var(--text-muted)',
                        tborder: 'var(--border-color)',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const APP_VERSION = "2.5.0"; 

        const ICONS = {
            store: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>`,
            users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            candy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.5 7.5-2 2a4.95 4.95 0 1 0 7 7l2-2a4.95 4.95 0 1 0-7-7Z"/><path d="M14 6.5v10"/><path d="M10 7.5v10"/><path d="m16 7 1-5 1.36.68A3 3 0 0 0 19.7 3h.3v.3a3 3 0 0 0-.68 1.34L20 6l-4 1Z"/><path d="m8 17-1 5-1.36-.68A3 3 0 0 0 4.3 21H4v-.3a3 3 0 0 0 .68-1.34L4 18l4-1Z"/></svg>`,
            history: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`,
            receipt: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></svg>`,
            'layout-dashboard': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>`,
            wallet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>`,
            'shopping-cart': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`,
            phone: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
            'trash-2': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`,
            plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
            x: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            'check-circle-2': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
            'edit-2': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`,
            download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>`,
            upload: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>`,
            'alert-circle': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`,
            'chevron-down': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            'chevron-up': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`,
            settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
            sun: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`,
            database: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>`
        };

        const Icon = ({ name, className }) => (
            <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: ICONS[name] }} />
        );

        function App() {
            const safeLoad = (key, defaultVal) => {
                try { 
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultVal; 
                } catch (e) { return defaultVal; }
            };

            const [tema, setTema] = useState(() => localStorage.getItem('g_doces_tema') || 'claro');
            const [clientes, setClientes] = useState(() => safeLoad('g_doces_clientes', []));
            const [doces, setDoces] = useState(() => safeLoad('g_doces_produtos', []));
            const [vendas, setVendas] = useState(() => safeLoad('g_doces_vendas', []));
            const [pagamentos, setPagamentos] = useState(() => safeLoad('g_doces_pagamentos', []));
            const [logsPagamentos, setLogsPagamentos] = useState(() => safeLoad('g_doces_logs', []));

            useEffect(() => {
                document.documentElement.className = `tema-${tema}`;
                localStorage.setItem('g_doces_tema', tema);
            }, [tema]);

            useEffect(() => { localStorage.setItem('g_doces_clientes', JSON.stringify(clientes)); }, [clientes]);
            useEffect(() => { localStorage.setItem('g_doces_produtos', JSON.stringify(doces)); }, [doces]);
            useEffect(() => { localStorage.setItem('g_doces_vendas', JSON.stringify(vendas)); }, [vendas]);
            useEffect(() => { localStorage.setItem('g_doces_pagamentos', JSON.stringify(pagamentos)); }, [pagamentos]);
            useEffect(() => { localStorage.setItem('g_doces_logs', JSON.stringify(logsPagamentos)); }, [logsPagamentos]);

            const [abaAtiva, setAbaAtiva] = useState('resumo'); 
            const [modalVenda, setModalVenda] = useState({ aberto: false, clienteId: null, clienteNome: '' });
            const [doceSelecionado, setDoceSelecionado] = useState('');
            const [quantidadeVenda, setQuantidadeVenda] = useState(1);
            const [erroVenda, setErroVenda] = useState('');
            const [modalPagamento, setModalPagamento] = useState({ aberto: false, clienteId: null, clienteNome: '', totalDevido: 0 });
            const [valorPagamento, setValorPagamento] = useState('');
            
            const [editandoCliente, setEditandoCliente] = useState(null);
            const [editandoDoce, setEditandoDoce] = useState(null);
            const [modalAjustes, setModalAjustes] = useState(false);
            const [clientesExpandidos, setClientesExpandidos] = useState([]);
            const [caixaExpandidos, setCaixaExpandidos] = useState([]); 
            const [toast, setToast] = useState({ aberto: false, mensagem: '', tipo: 'success' });
            const [modalConfirm, setModalConfirm] = useState({ aberto: false, mensagem: '', onConfirm: null });

            const [novoCliente, setNovoCliente] = useState({ nome: '', departamento: '', whatsapp: '' });
            const [novoDoce, setNovoDoce] = useState({ nome: '', preco: '', estoque: '' });

            const fileInputRef = useRef(null);

            const mostrarToast = (mensagem, tipo = 'success') => {
                setToast({ aberto: true, mensagem, tipo });
                setTimeout(() => setToast(t => ({ ...t, aberto: false })), 3000);
            };

            const exportarDados = () => {
                const dados = { clientes, doces, vendas, pagamentos, logsPagamentos };
                const blob = new Blob([JSON.stringify(dados)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_doces_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                mostrarToast("Backup exportado!", "success");
            };

            const importarDados = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const dados = JSON.parse(e.target.result);
                        setModalConfirm({
                            mensagem: "Restaurar backup substituirá os dados atuais. Confirmar?",
                            onConfirm: () => {
                                setClientes(dados.clientes || []);
                                setDoces(dados.doces || []);
                                setVendas(dados.vendas || []);
                                setPagamentos(dados.pagamentos || []);
                                setLogsPagamentos(dados.logsPagamentos || []);
                                setModalConfirm({ aberto: false });
                                mostrarToast("Backup restaurado!", "success");
                            },
                            aberto: true
                        });
                    } catch (err) { mostrarToast("Erro ao ler arquivo.", "erro"); }
                };
                reader.readAsText(file);
            };

            const gerarId = () => Math.random().toString(36).substring(2, 9) + Date.now().toString(36);

            const adicionarCliente = (e) => {
                e.preventDefault();
                setClientes([...clientes, { ...novoCliente, id: gerarId() }]);
                setNovoCliente({ nome: '', departamento: '', whatsapp: '' });
                mostrarToast("Cliente salvo!");
            };

            const atualizarCliente = (e) => {
                e.preventDefault();
                setClientes(clientes.map(c => c.id === editandoCliente.id ? editandoCliente : c));
                setEditandoCliente(null);
                mostrarToast("Cliente atualizado!");
            };

            const removerCliente = (id) => {
                setModalConfirm({
                    mensagem: "Excluir cliente e suas dívidas permanentemente?",
                    onConfirm: () => {
                        setClientes(clientes.filter(c => c.id !== id));
                        setVendas(vendas.filter(v => v.clienteId !== id));
                        setPagamentos(pagamentos.filter(p => p.clienteId !== id));
                        setModalConfirm({ aberto: false });
                        mostrarToast("Cliente removido.");
                    },
                    aberto: true
                });
            };

            const toggleExpandirCaixa = (id) => {
                setCaixaExpandidos(prev => prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]);
            };

            const adicionarDoce = (e) => {
                e.preventDefault();
                const p = parseFloat(novoDoce.preco.toString().replace(',', '.'));
                const s = parseInt(novoDoce.estoque, 10);
                if (isNaN(p) || isNaN(s)) return;
                setDoces([...doces, { id: gerarId(), nome: novoDoce.nome, preco: p, estoque: s }]);
                setNovoDoce({ nome: '', preco: '', estoque: '' });
                mostrarToast("Produto salvo!");
            };

            const atualizarDoce = (e) => {
                e.preventDefault();
                const p = parseFloat(editandoDoce.preco.toString().replace(',', '.'));
                const s = parseInt(editandoDoce.estoque, 10);
                setDoces(doces.map(d => d.id === editandoDoce.id ? { ...editandoDoce, preco: p, estoque: s } : d));
                setEditandoDoce(null);
                mostrarToast("Produto atualizado!");
            };

            const removerDoce = (id) => {
                setModalConfirm({
                    mensagem: "Remover este produto do estoque?",
                    onConfirm: () => {
                        setDoces(doces.filter(d => d.id !== id));
                        setModalConfirm({ aberto: false });
                        mostrarToast("Produto removido.");
                    },
                    aberto: true
                });
            };

            const registrarVenda = (e) => {
                e.preventDefault();
                const doce = doces.find(d => d.id === doceSelecionado);
                const qtd = parseInt(quantidadeVenda, 10);
                if (!doce || doce.estoque < qtd) { setErroVenda("Estoque insuficiente."); return; }

                setDoces(doces.map(d => d.id === doce.id ? { ...d, estoque: d.estoque - qtd } : d));
                setVendas([...vendas, {
                    id: gerarId(), clienteId: modalVenda.clienteId, doceId: doce.id,
                    doceNome: qtd > 1 ? `${qtd}x ${doce.nome}` : doce.nome,
                    preco: doce.preco * qtd, data: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now()
                }]);
                setModalVenda({ aberto: false });
                setDoceSelecionado('');
                setQuantidadeVenda(1);
                mostrarToast("Venda realizada!");
            };

            const removerVenda = (vId, dId, nome) => {
                setModalConfirm({
                    mensagem: "Cancelar esta venda e devolver ao estoque?",
                    onConfirm: () => {
                        let qtd = 1;
                        const match = nome.match(/^(\d+)x/);
                        if(match) qtd = parseInt(match[1], 10);
                        setDoces(doces.map(d => d.id === dId ? { ...d, estoque: d.estoque + qtd } : d));
                        setVendas(vendas.filter(v => v.id !== vId));
                        setModalConfirm({ aberto: false });
                        mostrarToast("Venda cancelada.");
                    },
                    aberto: true
                });
            };

            const confirmarPagamento = (e) => {
                e.preventDefault();
                const val = parseFloat(valorPagamento.toString().replace(',', '.'));
                if (isNaN(val) || val <= 0) return;

                const pid = gerarId();
                setLogsPagamentos([...logsPagamentos, {
                    id: pid, clienteId: modalPagamento.clienteId, clienteNome: modalPagamento.clienteNome, valor: val,
                    data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}), timestamp: Date.now()
                }]);

                if (val >= modalPagamento.totalDevido - 0.01) {
                    setVendas(vendas.filter(v => v.clienteId !== modalPagamento.clienteId));
                    setPagamentos(pagamentos.filter(p => p.clienteId !== modalPagamento.clienteId));
                } else {
                    setPagamentos([...pagamentos, { id: pid, clienteId: modalPagamento.clienteId, valor: val, data: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now() }]);
                }
                setModalPagamento({ aberto: false });
                setValorPagamento('');
                mostrarToast("Recebimento registrado!");
            };

            const removerLogPagamento = (id) => {
                setModalConfirm({
                    mensagem: "Remover este registro? (Isso desfará o pagamento na conta do cliente)",
                    onConfirm: () => {
                        setLogsPagamentos(logsPagamentos.filter(l => l.id !== id));
                        setPagamentos(pagamentos.filter(p => p.id !== id));
                        setModalConfirm({ aberto: false });
                        mostrarToast("Registro removido.");
                    },
                    aberto: true
                });
            };

            return (
                <div className="min-h-screen relative pb-24 transition-colors duration-300">
                    <header className="bg-tcard pt-10 pb-5 px-6 border-b border-tborder sticky top-0 z-10 shadow-sm flex justify-center items-center transition-colors">
                        <h1 className="text-xl font-extrabold text-indigo-500 uppercase tracking-widest text-center">Gestão de Doces</h1>
                        <button onClick={() => setModalAjustes(true)} className="absolute right-6 p-2 bg-slate-500/10 rounded-full text-tmuted outline-none transition-colors">
                            <Icon name="settings" className="w-5 h-5" />
                        </button>
                    </header>

                    <main className="p-6 max-w-md mx-auto">
                        
                        {abaAtiva === 'resumo' && (
                            <div className="space-y-6">
                                {(() => {
                                    const total = clientes.reduce((acc, c) => {
                                        const v = vendas.filter(v => v.clienteId === c.id).reduce((s, v) => s + v.preco, 0);
                                        const p = pagamentos.filter(p => p.clienteId === c.id).reduce((s, p) => s + p.valor, 0);
                                        return acc + Math.max(0, v - p);
                                    }, 0);
                                    return (
                                        <div className="bg-red-500/10 p-5 rounded-2xl border border-red-500/20 flex justify-between items-center shadow-sm">

                                <h3 className="text-2xl font-black text-tmain mb-8 text-center uppercase tracking-tighter">Editar Cliente</h3>
                                <form onSubmit={atualizarCliente} className="space-y-4">
                                    <input type="text" required className="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none transition-all" value={editandoCliente.nome} onChange={e=>setEditandoCliente({...editandoCliente, nome:e.target.value})} />
                                    <input type="text" required className="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none transition-all" value={editandoCliente.departamento} onChange={e=>setEditandoCliente({...editandoCliente, departamento:e.target.value})} />
                                    <input type="tel" className="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none transition-all" value={editandoCliente.whatsapp} onChange={e=>setEditandoCliente({...editandoCliente, whatsapp:e.target.value})} />
                                    <div className="flex space-x-3 pt-6">
                                        <button type="button" onClick={()=>setEditandoCliente(null)} className="flex-1 p-5 rounded-3xl bg-slate-500/10 text-tmuted font-black uppercase text-sm active:scale-95 transition-all outline-none">Cancelar</button>
                                        <button className="flex-1 p-5 rounded-3xl bg-indigo-500 text-white font-black uppercase text-sm shadow-xl active:scale-95 transition-all outline-none">Salvar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL PAGAMENTO */}
                    {modalPagamento.aberto && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-xl transition-all">
                            <div className="bg-tcard rounded-[50px] p-10 w-full max-w-sm border border-tborder shadow-2xl transition-all">
                                <h3 className="text-3xl font-black text-tmain mb-1 text-center transition-all">Receber</h3>
                                <p className="text-sm text-tmuted mb-10 text-center font-bold tracking-widest uppercase opacity-60 transition-all">Total: R$ {modalPagamento.totalDevido.toFixed(2).replace('.', ',')}</p>
                                <form onSubmit={confirmarPagamento} className="space-y-6">
                                    <div className="relative transition-all">
                                        <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-tmuted text-xl">R$</span>
                                        <input type="number" step="0.01" required className="w-full p-8 pl-14 rounded-[35px] bg-tinput text-tmain text-4xl font-black outline-none border border-tborder shadow-inner transition-colors" value={valorPagamento} onChange={e=>setValorPagamento(e.target.value)} autoFocus />
                                    </div>
                                    <button className="w-full bg-emerald-500 text-white p-8 rounded-[35px] font-black text-2xl shadow-2xl active:scale-95 transition-all">Confirmar Pagamento</button>
                                    <button type="button" onClick={()=>setModalPagamento({aberto:false})} className="w-full text-tmuted font-black py-2 uppercase text-xs tracking-widest opacity-40 outline-none">Voltar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONFIRMAÇÃO */}
                    {modalConfirm.aberto && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 backdrop-blur-md transition-all">
                            <div className="bg-tcard rounded-[40px] p-8 w-full max-w-xs border border-tborder shadow-2xl text-center transition-colors">
                                <div className="mx-auto bg-red-500/10 text-red-500 w-20 h-20 rounded-full flex items-center justify-center mb-6 transition-all"><Icon name="alert-circle" className="w-10 h-10" /></div>
                                <p className="font-black text-tmain mb-8 leading-tight text-xl transition-all">{modalConfirm.mensagem}</p>
                                <div className="flex space-x-3 transition-all">
                                    <button onClick={()=>setModalConfirm({aberto:false})} className="flex-1 p-5 rounded-3xl bg-slate-500/10 text-tmuted font-black uppercase active:scale-95 transition-all outline-none">Não</button>
                                    <button onClick={modalConfirm.onConfirm} className="flex-1 p-5 rounded-3xl bg-red-500 text-white font-black uppercase shadow-xl active:scale-95 transition-all outline-none">Sim</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TOASTS */}
                    {toast.aberto && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full shadow-2xl z-[100] text-white flex items-center font-black text-sm border border-white/20 transition-all duration-500 ${toast.tipo==='erro'?'bg-red-500':'bg-indigo-500 translate-y-0'}`}>
                            <Icon name={toast.tipo==='erro'?'alert-circle':'check-circle-2'} className="w-5 h-5 mr-3" />
                            {toast.mensagem}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                const scope = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                navigator.serviceWorker.register('sw.js', { scope: scope })
                    .then(function(reg) { console.log('SW registrado:', reg.scope); })
                    .catch(function(err) { console.warn('PWA desativado (local ou erro):', err); });
            });
        }
    </script>
</body>
</html>
