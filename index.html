<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Doces</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m9.5 7.5-2 2a4.95 4.95 0 1 0 7 7l2-2a4.95 4.95 0 1 0-7-7Z'/%3E%3Cpath d='M14 6.5v10'/%3E%3Cpath d='M10 7.5v10'/%3E%3Cpath d='m16 7 1-5 1.36.68A3 3 0 0 0 19.7 3h.3v.3a3 3 0 0 0-.68 1.34L20 6l-4 1Z'/%3E%3Cpath d='m8 17-1 5-1.36-.68A3 3 0 0 0 4.3 21H4v-.3a3 3 0 0 0 .68-1.34L4 18l4-1Z'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <style type="text/tailwindcss">
        @layer base {
            :root, .tema-claro {
                --bg-base: #f8fafc;
                --bg-card: #ffffff;
                --bg-input: #f1f5f9;
                --text-main: #0f172a;
                --text-muted: #64748b;
                --border-color: #e2e8f0;
            }
            .tema-medio {
                --bg-base: #0f172a;
                --bg-card: #1e293b;
                --bg-input: #0f172a;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border-color: #334155;
            }
            .tema-escuro {
                --bg-base: #020617;
                --bg-card: #09090b;
                --bg-input: #020617;
                --text-main: #f8fafc;
                --text-muted: #6b7280;
                --border-color: #1f2937;
            }
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tbase: 'var(--bg-base)',
                        tcard: 'var(--bg-card)',
                        tinput: 'var(--bg-input)',
                        tmain: 'var(--text-main)',
                        tmuted: 'var(--text-muted)',
                        tborder: 'var(--border-color)',
                    }
                }
            }
        }
    </script>
</head>
<body>

    <!-- Container Principal -->
    <div class="min-h-screen relative pb-24 transition-colors duration-300">
        <!-- Header -->
        <header class="bg-tcard pt-10 pb-5 px-6 border-b border-tborder sticky top-0 z-10 shadow-sm flex justify-center items-center transition-colors">
            <h1 class="text-xl font-extrabold text-indigo-500 uppercase tracking-widest text-center">Gestão de Doces</h1>
            <button onclick="abrirModal('modal-ajustes')" class="absolute right-6 p-2 bg-slate-500/10 rounded-full text-tmuted outline-none transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </header>

        <main class="p-6 max-w-md mx-auto">
            <!-- ABA RESUMO -->
            <div id="aba-resumo" class="tab-content active space-y-6">
                <div class="bg-red-500/10 p-5 rounded-2xl border border-red-500/20 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[11px] font-bold text-red-500 uppercase tracking-wider mb-1">Saldo a Receber</p>
                        <p id="total-receber" class="text-2xl font-black text-red-500">R$ 0,00</p>
                    </div>
                    <div class="p-3 bg-tcard rounded-full shadow-sm text-red-500">
                        <i data-lucide="wallet" class="w-6 h-6"></i>
                    </div>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-tmain uppercase tracking-wider mb-4 px-1 flex items-center transition-colors">
                        <i data-lucide="users" class="w-4 h-4 mr-2 text-indigo-500"></i> Contas de Clientes
                    </h3>
                    <div id="resumo-lista"></div>
                </div>
            </div>

            <!-- ABA CLIENTES -->
            <div id="aba-clientes" class="tab-content space-y-6">
                <div class="bg-tcard p-6 rounded-2xl border border-tborder shadow-sm transition-colors">
                    <h2 class="text-lg font-bold text-tmain mb-4 flex items-center border-b border-tborder pb-2 transition-colors">
                        <i data-lucide="users" class="w-5 h-5 mr-2 text-indigo-500"></i> Novo Cliente
                    </h2>
                    <form id="form-cliente" class="space-y-4">
                        <input type="text" id="cli-nome" placeholder="Nome *" required class="w-full p-3.5 rounded-xl bg-tinput text-tmain outline-none focus:ring-2 focus:ring-indigo-500 border border-tborder transition-colors">
                        <input type="text" id="cli-dept" placeholder="Departamento *" required class="w-full p-3.5 rounded-xl bg-tinput text-tmain outline-none focus:ring-2 focus:ring-indigo-500 border border-tborder transition-colors">
                        <input type="tel" id="cli-zap" placeholder="WhatsApp (DDD + Número)" class="w-full p-3.5 rounded-xl bg-tinput text-tmain outline-none focus:ring-2 focus:ring-indigo-500 border border-tborder transition-colors">
                        <button type="submit" class="w-full bg-indigo-500 text-white p-3.5 rounded-xl font-bold shadow-lg active:scale-95 transition-all">Salvar Cliente</button>
                    </form>
                </div>
                <div id="clientes-lista" class="space-y-3"></div>
            </div>

            <!-- ABA ESTOQUE -->
            <div id="aba-doces" class="tab-content space-y-6">
                <div class="bg-tcard p-6 rounded-2xl border border-tborder shadow-sm transition-colors">
                    <h2 class="text-lg font-bold text-tmain mb-4 flex items-center border-b border-tborder pb-2 transition-colors">
                        <i data-lucide="candy" class="w-5 h-5 mr-2 text-indigo-500"></i> Novo Produto
                    </h2>
                    <form id="form-doce" class="space-y-4">
                        <input type="text" id="doce-nome" placeholder="Nome *" required class="w-full p-3.5 rounded-xl bg-tinput text-tmain outline-none focus:ring-2 focus:ring-indigo-500 border border-tborder transition-colors">
                        <div class="flex space-x-4">
                            <input type="number" id="doce-preco" step="0.01" placeholder="Preço R$*" required class="w-1/2 p-3.5 rounded-xl bg-tinput text-tmain outline-none focus:ring-2 focus:ring-indigo-500 border border-tborder transition-colors">
                            <input type="number" id="doce-estoque" placeholder="Estoque *" required class="w-1/2 p-3.5 rounded-xl bg-tinput text-tmain outline-none focus:ring-2 focus:ring-indigo-500 border border-tborder transition-colors">
                        </div>
                        <button type="submit" class="w-full bg-indigo-500 text-white p-3.5 rounded-xl font-bold shadow-lg active:scale-95 transition-all">Salvar Produto</button>
                    </form>
                </div>
                <div id="doces-lista" class="space-y-3"></div>
            </div>

            <!-- ABA CAIXA -->
            <div id="aba-caixa" class="tab-content space-y-6">
                <div class="bg-gradient-to-br from-emerald-600 to-teal-800 p-8 rounded-2xl shadow-lg text-white text-center relative overflow-hidden transition-all duration-300">
                    <div class="absolute -left-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                    <i data-lucide="history" class="w-10 h-10 mx-auto mb-2"></i>
                    <p class="text-emerald-100 text-[10px] font-bold uppercase tracking-widest transition-all">Total Arrecadado</p>
                    <p id="caixa-total" class="text-4xl font-black tracking-tight transition-all">R$ 0,00</p>
                </div>
                <div id="caixa-lista" class="space-y-3"></div>
            </div>
        </main>

        <!-- Navegação Inferior -->
        <nav class="fixed bottom-0 left-0 right-0 bg-tcard border-t border-tborder pb-safe z-20 shadow-lg flex justify-around p-2 transition-colors">
            <button onclick="mudarAba('resumo')" class="nav-btn flex flex-col items-center p-2 transition-all text-indigo-500 scale-110" data-aba="resumo">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i><span class="text-[10px] font-bold mt-1 uppercase tracking-wider">Vendas</span>
            </button>
            <button onclick="mudarAba('clientes')" class="nav-btn flex flex-col items-center p-2 transition-all text-tmuted opacity-60" data-aba="clientes">
                <i data-lucide="users" class="w-6 h-6"></i><span class="text-[10px] font-bold mt-1 uppercase tracking-wider">Clientes</span>
            </button>
            <button onclick="mudarAba('doces')" class="nav-btn flex flex-col items-center p-2 transition-all text-tmuted opacity-60" data-aba="doces">
                <i data-lucide="candy" class="w-6 h-6"></i><span class="text-[10px] font-bold mt-1 uppercase tracking-wider">Estoque</span>
            </button>
            <button onclick="mudarAba('caixa')" class="nav-btn flex flex-col items-center p-2 transition-all text-tmuted opacity-60" data-aba="caixa">
                <i data-lucide="wallet" class="w-6 h-6"></i><span class="text-[10px] font-bold mt-1 uppercase tracking-wider">Caixa</span>
            </button>
        </nav>
    </div>

    <!-- MODAIS -->
    <!-- Modal Ajustes -->
    <div id="modal-ajustes" class="modal fixed inset-0 bg-black/80 z-50 items-center justify-center p-4 backdrop-blur-sm transition-all">
        <div class="bg-tcard rounded-3xl p-6 w-full max-w-sm border border-tborder shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-tborder pb-4 transition-all">
                <h3 class="text-lg font-bold text-tmain flex items-center"><i data-lucide="settings" class="w-5 h-5 mr-2 text-indigo-500"></i> Configurações</h3>
                <button onclick="fecharModal('modal-ajustes')" class="text-tmuted bg-slate-500/10 p-2 rounded-full active:scale-90 transition-all outline-none"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-6 transition-all">
                <div>
                    <label class="text-[10px] font-black text-tmuted uppercase mb-3 block tracking-widest text-center opacity-70">Tema Visual</label>
                    <div class="flex bg-tinput p-1.5 rounded-2xl border border-tborder transition-colors">
                        <button onclick="setTema('claro')" class="tema-btn flex-1 py-3 rounded-xl text-xs font-black capitalize transition-all text-tmuted hover:text-tmain" data-tema="claro">Claro</button>
                        <button onclick="setTema('medio')" class="tema-btn flex-1 py-3 rounded-xl text-xs font-black capitalize transition-all text-tmuted hover:text-tmain" data-tema="medio">Médio</button>
                        <button onclick="setTema('escuro')" class="tema-btn flex-1 py-3 rounded-xl text-xs font-black capitalize transition-all text-tmuted hover:text-tmain" data-tema="escuro">Escuro</button>
                    </div>
                </div>
                <div class="border-t border-tborder pt-6 space-y-3 transition-all">
                    <button onclick="exportarDados()" class="w-full flex items-center justify-center p-4 bg-indigo-500/10 text-indigo-500 font-black text-sm rounded-2xl border border-indigo-500/20 active:scale-95 transition-all shadow-lg"><i data-lucide="download" class="w-4 h-4 mr-2"></i> Salvar Backup</button>
                    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importarDados(event)" />
                    <button onclick="document.getElementById('import-file').click()" class="w-full flex items-center justify-center p-4 bg-slate-500/10 text-tmuted font-black text-sm rounded-2xl border border-tborder active:scale-95 transition-all shadow-sm"><i data-lucide="upload" class="w-4 h-4 mr-2"></i> Restaurar Backup</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Venda -->
    <div id="modal-venda" class="modal fixed inset-0 bg-black/80 z-50 items-center justify-center p-4 backdrop-blur-sm transition-all">
        <div class="bg-tcard rounded-[40px] p-8 w-full max-w-sm border border-tborder shadow-2xl transition-all">
            <div class="flex justify-between items-center mb-8 transition-all">
                <h3 class="text-2xl font-black text-tmain transition-all">Nova Venda</h3>
                <button onclick="fecharModal('modal-venda')" class="p-2 text-tmuted bg-slate-500/10 rounded-full active:scale-90 transition-transform outline-none"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="form-venda" class="space-y-6 transition-all">
                <p class="text-sm font-bold text-tmuted uppercase tracking-widest text-center transition-all">Cliente: <span id="venda-cliente-nome" class="text-indigo-500 font-black transition-all"></span></p>
                <div class="flex space-x-3 transition-all">
                    <div class="flex-1">
                        <label class="text-[10px] font-black uppercase text-tmuted mb-2 block tracking-widest text-center opacity-70 transition-all">Produto</label>
                        <select id="venda-doce-select" required class="w-full p-5 rounded-3xl bg-tinput text-tmain outline-none font-bold text-sm border border-tborder transition-colors">
                            <!-- Opções populadas no JS -->
                        </select>
                    </div>
                    <div class="w-24">
                        <label class="text-[10px] font-black uppercase text-tmuted mb-2 block tracking-widest text-center opacity-70 transition-all">Qtd</label>
                        <input type="number" id="venda-qtd" min="1" value="1" required class="w-full p-5 rounded-3xl bg-tinput text-tmain text-center font-black border border-tborder transition-colors" />
                    </div>
                </div>
                <p id="erro-venda" class="hidden text-xs text-red-500 font-black bg-red-500/10 p-4 rounded-2xl border border-red-500/20 text-center transition-all"></p>
                <button type="submit" class="w-full bg-indigo-500 text-white p-6 rounded-[30px] font-black text-xl shadow-2xl active:scale-95 transition-all">Confirmar</button>
            </form>
        </div>
    </div>

    <!-- Modal Editar Doce -->
    <div id="modal-edita-doce" class="modal fixed inset-0 bg-black/80 z-50 items-center justify-center p-4 backdrop-blur-sm transition-all">
        <div class="bg-tcard rounded-[40px] p-8 w-full max-w-sm border border-tborder shadow-2xl transition-all">
            <h3 class="text-2xl font-black text-tmain mb-8 text-center uppercase tracking-tighter">Editar Produto</h3>
            <form id="form-edita-doce" class="space-y-4 transition-all">
                <label class="text-[10px] font-black uppercase text-tmuted mb-1 block tracking-widest opacity-70 transition-all">Nome do Produto</label>
                <input type="text" id="edita-doce-nome" required class="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                <div class="flex space-x-3 transition-all">
                    <div class="flex-1">
                        <label class="text-[10px] font-black uppercase text-tmuted mb-1 block tracking-widest opacity-70 transition-all">Preço R$</label>
                        <input type="number" id="edita-doce-preco" step="0.01" required class="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-black uppercase text-tmuted mb-1 block tracking-widest opacity-70 transition-all">Estoque</label>
                        <input type="number" id="edita-doce-estoque" required class="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                    </div>
                </div>
                <div class="flex space-x-3 pt-6 transition-all">
                    <button type="button" onclick="fecharModal('modal-edita-doce')" class="flex-1 p-5 rounded-3xl bg-slate-500/10 text-tmuted font-black uppercase text-sm active:scale-95 transition-all outline-none">Cancelar</button>
                    <button type="submit" class="flex-1 p-5 rounded-3xl bg-indigo-500 text-white font-black uppercase text-sm shadow-xl active:scale-95 transition-all outline-none">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Editar Cliente -->
    <div id="modal-edita-cliente" class="modal fixed inset-0 bg-black/80 z-50 items-center justify-center p-4 backdrop-blur-sm transition-all">
        <div class="bg-tcard rounded-[40px] p-8 w-full max-w-sm border border-tborder shadow-2xl transition-all">
            <h3 class="text-2xl font-black text-tmain mb-8 text-center uppercase tracking-tighter transition-all">Editar Cliente</h3>
            <form id="form-edita-cliente" class="space-y-4 transition-all">
                <input type="text" id="edita-cli-nome" required class="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none transition-all" />
                <input type="text" id="edita-cli-dept" required class="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none transition-all" />
                <input type="tel" id="edita-cli-zap" class="w-full p-5 rounded-3xl bg-tinput text-tmain font-black border border-tborder outline-none transition-all" />
                <div class="flex space-x-3 pt-6 transition-all">
                    <button type="button" onclick="fecharModal('modal-edita-cliente')" class="flex-1 p-5 rounded-3xl bg-slate-500/10 text-tmuted font-black uppercase text-sm active:scale-95 transition-all outline-none">Cancelar</button>
                    <button type="submit" class="flex-1 p-5 rounded-3xl bg-indigo-500 text-white font-black uppercase text-sm shadow-xl active:scale-95 transition-all outline-none">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Pagamento -->
    <div id="modal-pagamento" class="modal fixed inset-0 bg-black/90 z-50 items-center justify-center p-4 backdrop-blur-xl transition-all">
        <div class="bg-tcard rounded-[50px] p-10 w-full max-w-sm border border-tborder shadow-2xl transition-all">
            <h3 class="text-3xl font-black text-tmain mb-1 text-center transition-all">Receber</h3>
            <p id="pagamento-total-texto" class="text-sm text-tmuted mb-10 text-center font-bold tracking-widest uppercase opacity-60 transition-all"></p>
            <form id="form-pagamento" class="space-y-6 transition-all">
                <div class="relative transition-all">
                    <span class="absolute left-6 top-1/2 -translate-y-1/2 font-black text-tmuted text-xl transition-all">R$</span>
                    <input type="number" id="pagamento-valor" step="0.01" required class="w-full p-8 pl-14 rounded-[35px] bg-tinput text-tmain text-4xl font-black outline-none border border-tborder shadow-inner transition-colors" />
                </div>
                <button type="submit" class="w-full bg-emerald-500 text-white p-8 rounded-[35px] font-black text-2xl shadow-2xl active:scale-95 transition-all">Confirmar Pagamento</button>
                <button type="button" onclick="fecharModal('modal-pagamento')" class="w-full text-tmuted font-black py-2 uppercase text-xs tracking-widest opacity-40 outline-none transition-all">Voltar</button>
            </form>
        </div>
    </div>

    <!-- Modal Confirmação Customizado -->
    <div id="modal-confirm" class="modal fixed inset-0 bg-black/80 z-[60] items-center justify-center p-4 backdrop-blur-md transition-all">
        <div class="bg-tcard rounded-[40px] p-8 w-full max-w-xs border border-tborder shadow-2xl text-center transition-colors">
            <div class="mx-auto bg-red-500/10 text-red-500 w-20 h-20 rounded-full flex items-center justify-center mb-6 transition-all"><i data-lucide="alert-circle" class="w-10 h-10"></i></div>
            <p id="confirm-msg" class="font-black text-tmain mb-8 leading-tight text-xl transition-all"></p>
            <div class="flex space-x-3 transition-all">
                <button onclick="fecharModal('modal-confirm')" class="flex-1 p-5 rounded-3xl bg-slate-500/10 text-tmuted font-black uppercase active:scale-95 transition-all outline-none">Não</button>
                <button id="btn-confirm-action" class="flex-1 p-5 rounded-3xl bg-red-500 text-white font-black uppercase shadow-xl active:scale-95 transition-all outline-none">Sim</button>
            </div>
        </div>
    </div>

    <!-- Toasts -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full shadow-2xl z-[100] text-white flex items-center font-black text-sm border border-white/20 transition-all duration-500 opacity-0 translate-y-[-100%] pointer-events-none">
        <i id="toast-icon" data-lucide="check-circle-2" class="w-5 h-5 mr-3"></i>
        <span id="toast-msg"></span>
    </div>

    <!-- Bibliotecas de Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- SCRIPTS CORE (VANILLA JS - 100% Compatível e Rápido) -->
    <script>
        // --- GERENCIAMENTO DE ESTADO LOCAL ---
        let db = {
            tema: localStorage.getItem('g_doces_tema') || 'claro',
            clientes: JSON.parse(localStorage.getItem('g_doces_clientes') || '[]'),
            doces: JSON.parse(localStorage.getItem('g_doces_produtos') || '[]'),
            vendas: JSON.parse(localStorage.getItem('g_doces_vendas') || '[]'),
            pagamentos: JSON.parse(localStorage.getItem('g_doces_pagamentos') || '[]'),
            logsPagamentos: JSON.parse(localStorage.getItem('g_doces_logs') || '[]'),
        };

        const salvarDb = () => {
            localStorage.setItem('g_doces_tema', db.tema);
            localStorage.setItem('g_doces_clientes', JSON.stringify(db.clientes));
            localStorage.setItem('g_doces_produtos', JSON.stringify(db.doces));
            localStorage.setItem('g_doces_vendas', JSON.stringify(db.vendas));
            localStorage.setItem('g_doces_pagamentos', JSON.stringify(db.pagamentos));
            localStorage.setItem('g_doces_logs', JSON.stringify(db.logsPagamentos));
            renderAll();
        };

        // --- ESTADOS DA UI ---
        let clienteAtualId = null;
        let doceAtualId = null;
        let confirmAction = null;
        let clientesExpandidos = [];
        let caixaExpandidos = [];

        // --- UTILITÁRIOS ---
        const gerarId = () => Math.random().toString(36).substring(2, 9) + Date.now().toString(36);
        const fmtMoney = (v) => parseFloat(v).toFixed(2).replace('.', ',');

        let toastTimeout;
        const mostrarToast = (msg, tipo = 'sucesso') => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.className = `fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full shadow-2xl z-[100] text-white flex items-center font-black text-sm border border-white/20 transition-all duration-500 ${tipo === 'erro' ? 'bg-red-500 translate-y-0 opacity-100' : 'bg-indigo-500 translate-y-0 opacity-100'}`;
            
            lucide.createIcons();

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.className = `fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full shadow-2xl z-[100] text-white flex items-center font-black text-sm border border-white/20 transition-all duration-500 -translate-y-[-100%] opacity-0 pointer-events-none ${tipo === 'erro' ? 'bg-red-500' : 'bg-indigo-500'}`;
            }, 3000);
        };

        const abrirModal = (id) => document.getElementById(id).classList.add('active');
        const fecharModal = (id) => document.getElementById(id).classList.remove('active');

        const abrirConfirmacao = (msg, acao) => {
            document.getElementById('confirm-msg').innerText = msg;
            confirmAction = acao;
            abrirModal('modal-confirm');
        };

        document.getElementById('btn-confirm-action').addEventListener('click', () => {
            if (confirmAction) confirmAction();
            fecharModal('modal-confirm');
        });

        // --- AÇÕES DO TEMA ---
        const setTema = (novoTema) => {
            db.tema = novoTema;
            document.documentElement.className = `tema-${novoTema}`;
            document.querySelectorAll('.tema-btn').forEach(btn => {
                if (btn.getAttribute('data-tema') === novoTema) {
                    btn.className = "tema-btn flex-1 py-3 rounded-xl text-xs font-black capitalize transition-all bg-tcard text-indigo-500 shadow-xl border border-tborder";
                } else {
                    btn.className = "tema-btn flex-1 py-3 rounded-xl text-xs font-black capitalize transition-all text-tmuted hover:text-tmain";
                }
            });
            salvarDb();
        };

        // --- BACKUP ---
        const exportarDados = () => {
            const dataStr = JSON.stringify(db);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_doces_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.json`;
            a.click();
            mostrarToast("Backup exportado!", "sucesso");
        };

        const importarDados = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const dados = JSON.parse(e.target.result);
                    abrirConfirmacao("Restaurar backup substituirá os dados atuais. Confirmar?", () => {
                        db.clientes = dados.clientes || [];
                        db.doces = dados.doces || [];
                        db.vendas = dados.vendas || [];
                        db.pagamentos = dados.pagamentos || [];
                        db.logsPagamentos = dados.logsPagamentos || [];
                        salvarDb();
                        fecharModal('modal-ajustes');
                        mostrarToast("Backup restaurado!", "sucesso");
                    });
                } catch (err) { mostrarToast("Erro ao ler arquivo.", "erro"); }
            };
            reader.readAsText(file);
        };

        // --- NAVEGAÇÃO ---
        const mudarAba = (abaId) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`aba-${abaId}`).classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn flex flex-col items-center p-2 transition-all text-tmuted opacity-60";
                if(btn.getAttribute('data-aba') === abaId) {
                    btn.className = `nav-btn flex flex-col items-center p-2 transition-all scale-110 ${abaId === 'caixa' ? 'text-emerald-500' : 'text-indigo-500'}`;
                }
            });
            renderAll();
        };

        // --- EVENTOS DE FORMULÁRIOS ---
        
        // Novo Cliente
        document.getElementById('form-cliente').addEventListener('submit', (e) => {
            e.preventDefault();
            db.clientes.push({
                id: gerarId(),
                nome: document.getElementById('cli-nome').value,
                departamento: document.getElementById('cli-dept').value,
                whatsapp: document.getElementById('cli-zap').value
            });
            e.target.reset();
            salvarDb();
            mostrarToast("Cliente salvo!");
        });

        // Edita Cliente
        document.getElementById('form-edita-cliente').addEventListener('submit', (e) => {
            e.preventDefault();
            const index = db.clientes.findIndex(c => c.id === clienteAtualId);
            if (index > -1) {
                db.clientes[index].nome = document.getElementById('edita-cli-nome').value;
                db.clientes[index].departamento = document.getElementById('edita-cli-dept').value;
                db.clientes[index].whatsapp = document.getElementById('edita-cli-zap').value;
                salvarDb();
                fecharModal('modal-edita-cliente');
                mostrarToast("Cliente atualizado!");
            }
        });

        // Novo Doce
        document.getElementById('form-doce').addEventListener('submit', (e) => {
            e.preventDefault();
            db.doces.push({
                id: gerarId(),
                nome: document.getElementById('doce-nome').value,
                preco: parseFloat(document.getElementById('doce-preco').value),
                estoque: parseInt(document.getElementById('doce-estoque').value, 10)
            });
            e.target.reset();
            salvarDb();
            mostrarToast("Produto salvo!");
        });

        // Edita Doce
        document.getElementById('form-edita-doce').addEventListener('submit', (e) => {
            e.preventDefault();
            const index = db.doces.findIndex(d => d.id === doceAtualId);
            if (index > -1) {
                db.doces[index].nome = document.getElementById('edita-doce-nome').value;
                db.doces[index].preco = parseFloat(document.getElementById('edita-doce-preco').value);
                db.doces[index].estoque = parseInt(document.getElementById('edita-doce-estoque').value, 10);
                salvarDb();
                fecharModal('modal-edita-doce');
                mostrarToast("Produto atualizado!");
            }
        });

        // Nova Venda
        document.getElementById('form-venda').addEventListener('submit', (e) => {
            e.preventDefault();
            const doceId = document.getElementById('venda-doce-select').value;
            const qtd = parseInt(document.getElementById('venda-qtd').value, 10);
            const errEl = document.getElementById('erro-venda');

            const doce = db.doces.find(d => d.id === doceId);
            if (!doce) return;

            if (doce.estoque < qtd) {
                errEl.innerText = "Estoque insuficiente.";
                errEl.classList.remove('hidden');
                return;
            }

            // Atualiza Estoque
            doce.estoque -= qtd;
            
            // Registra Venda
            db.vendas.push({
                id: gerarId(),
                clienteId: clienteAtualId,
                doceId: doce.id,
                doceNome: qtd > 1 ? `${qtd}x ${doce.nome}` : doce.nome,
                preco: doce.preco * qtd,
                data: new Date().toLocaleDateString('pt-BR'),
                timestamp: Date.now()
            });

            if(!clientesExpandidos.includes(clienteAtualId)) clientesExpandidos.push(clienteAtualId);

            errEl.classList.add('hidden');
            fecharModal('modal-venda');
            salvarDb();
            mostrarToast("Venda realizada!");
        });

        // Pagamento
        document.getElementById('form-pagamento').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = parseFloat(document.getElementById('pagamento-valor').value);
            const totalDevido = parseFloat(document.getElementById('modal-pagamento').getAttribute('data-devido'));
            
            if (isNaN(val) || val <= 0) return;

            const cliente = db.clientes.find(c => c.id === clienteAtualId);
            const pid = gerarId();

            db.logsPagamentos.push({
                id: pid, clienteId: clienteAtualId, clienteNome: cliente ? cliente.nome : 'Desconhecido', valor: val,
                data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}), timestamp: Date.now()
            });

            if (val >= totalDevido - 0.01) {
                db.vendas = db.vendas.filter(v => v.clienteId !== clienteAtualId);
                db.pagamentos = db.pagamentos.filter(p => p.clienteId !== clienteAtualId);
            } else {
                db.pagamentos.push({ id: pid, clienteId: clienteAtualId, valor: val, data: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now() });
            }

            fecharModal('modal-pagamento');
            salvarDb();
            mostrarToast("Recebimento registrado!");
        });

        // --- FUNÇÕES DE INTERAÇÃO NA LISTA ---
        window.prepararEdicaoCliente = (id) => {
            const c = db.clientes.find(x => x.id === id);
            if(c) {
                clienteAtualId = id;
                document.getElementById('edita-cli-nome').value = c.nome;
                document.getElementById('edita-cli-dept').value = c.departamento;
                document.getElementById('edita-cli-zap').value = c.whatsapp || '';
                abrirModal('modal-edita-cliente');
            }
        };

        window.excluirCliente = (id) => {
            abrirConfirmacao("Excluir cliente e suas dívidas permanentemente?", () => {
                db.clientes = db.clientes.filter(c => c.id !== id);
                db.vendas = db.vendas.filter(v => v.clienteId !== id);
                db.pagamentos = db.pagamentos.filter(p => p.clienteId !== id);
                salvarDb();
                mostrarToast("Cliente removido.");
            });
        };

        window.prepararEdicaoDoce = (id) => {
            const d = db.doces.find(x => x.id === id);
            if(d) {
                doceAtualId = id;
                document.getElementById('edita-doce-nome').value = d.nome;
                document.getElementById('edita-doce-preco').value = d.preco;
                document.getElementById('edita-doce-estoque').value = d.estoque;
                abrirModal('modal-edita-doce');
            }
        };

        window.excluirDoce = (id) => {
            abrirConfirmacao("Remover este produto do estoque?", () => {
                db.doces = db.doces.filter(d => d.id !== id);
                salvarDb();
                mostrarToast("Produto removido.");
            });
        };

        window.prepararVenda = (id, nome) => {
            clienteAtualId = id;
            document.getElementById('venda-cliente-nome').innerText = nome;
            const sel = document.getElementById('venda-doce-select');
            sel.innerHTML = '<option value="" disabled selected>Escolher doce...</option>';
            db.doces.forEach(d => {
                sel.innerHTML += `<option value="${d.id}" ${d.estoque <= 0 ? 'disabled' : ''}>${d.nome} (R$ ${fmtMoney(d.preco)})</option>`;
            });
            document.getElementById('venda-qtd').value = 1;
            document.getElementById('erro-venda').classList.add('hidden');
            abrirModal('modal-venda');
        };

        window.cancelarVenda = (vId, dId, nome) => {
            abrirConfirmacao("Cancelar esta venda e devolver ao estoque?", () => {
                let qtd = 1;
                const match = nome.match(/^(\d+)x/);
                if(match) qtd = parseInt(match[1], 10);
                
                const doce = db.doces.find(d => d.id === dId);
                if(doce) doce.estoque += qtd;
                
                db.vendas = db.vendas.filter(v => v.id !== vId);
                salvarDb();
                mostrarToast("Venda cancelada.");
            });
        };

        window.prepararPagamento = (id, nome, devido) => {
            clienteAtualId = id;
            document.getElementById('modal-pagamento').setAttribute('data-devido', devido);
            document.getElementById('pagamento-total-texto').innerText = `Total: R$ ${fmtMoney(devido)}`;
            document.getElementById('pagamento-valor').value = devido.toFixed(2);
            abrirModal('modal-pagamento');
        };

        window.removerLogCaixa = (id) => {
            abrirConfirmacao("Remover este registro? (Isso desfará o pagamento na conta do cliente)", () => {
                db.logsPagamentos = db.logsPagamentos.filter(l => l.id !== id);
                db.pagamentos = db.pagamentos.filter(p => p.id !== id);
                salvarDb();
                mostrarToast("Registro removido.");
            });
        };

        window.toggleExpandir = (id) => {
            if(clientesExpandidos.includes(id)) {
                clientesExpandidos = clientesExpandidos.filter(i => i !== id);
            } else {
                clientesExpandidos.push(id);
            }
            renderAll();
        };

        window.toggleCaixaExpandir = (id) => {
            if(caixaExpandidos.includes(id)) {
                caixaExpandidos = caixaExpandidos.filter(i => i !== id);
            } else {
                caixaExpandidos.push(id);
            }
            renderAll();
        };

        window.abrirZap = (e, zap) => {
            e.stopPropagation();
            let num = zap.replace(/\D/g, '');
            if(num) window.open(`https://wa.me/55${num}`, '_blank');
        };

        // --- MOTOR DE RENDERIZAÇÃO DOM ---
        function renderAll() {
            setTema(db.tema);

            // 1. Render Resumo
            const totalReceber = db.clientes.reduce((acc, c) => {
                const v = db.vendas.filter(v => v.clienteId === c.id).reduce((s, v) => s + v.preco, 0);
                const p = db.pagamentos.filter(p => p.clienteId === c.id).reduce((s, p) => s + p.valor, 0);
                return acc + Math.max(0, v - p);
            }, 0);
            document.getElementById('total-receber').innerText = `R$ ${fmtMoney(totalReceber)}`;

            const resumoHTML = db.clientes.sort((a,b)=>a.nome.localeCompare(b.nome)).map(c => {
                const vens = db.vendas.filter(v => v.clienteId === c.id);
                const pags = db.pagamentos.filter(p => p.clienteId === c.id);
                const saldo = vens.reduce((s,v)=>s+v.preco,0) - pags.reduce((s,p)=>s+p.valor,0);
                const exp = clientesExpandidos.includes(c.id);

                let html = `
                <div class="bg-tcard rounded-xl border border-tborder shadow-sm overflow-hidden transition-colors">
                    <div class="p-4 flex justify-between items-center cursor-pointer active:bg-slate-500/5 transition-colors" onclick="toggleExpandir('${c.id}')">
                        <div class="flex-1">
                            <div class="flex items-center"><h4 class="font-bold text-tmain mr-2 text-lg">${c.nome}</h4><i data-lucide="${exp?'chevron-up':'chevron-down'}" class="w-4 h-4 ${exp?'text-indigo-500':'text-tmuted'}"></i></div>
                            <div class="flex items-center space-x-2 mt-1"><span class="bg-slate-500/10 text-tmuted text-[10px] px-2 py-0.5 rounded font-bold uppercase">${c.departamento}</span>${!exp && saldo > 0.01 ? `<span class="text-[10px] font-bold text-red-500 bg-red-500/10 px-2 py-0.5 rounded">R$ ${fmtMoney(saldo)}</span>` : ''}</div>
                        </div>
                        <div class="flex items-center space-x-1">
                            ${c.whatsapp ? `<button onclick="abrirZap(event, '${c.whatsapp}')" class="p-2 text-emerald-500 transition-transform active:scale-90"><i data-lucide="phone" class="w-5 h-5"></i></button>` : ''}
                            ${exp ? `<button onclick="event.stopPropagation(); prepararVenda('${c.id}', '${c.nome}')" class="bg-indigo-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center shadow-lg active:scale-95 transition-all"><i data-lucide="shopping-cart" class="w-4 h-4 mr-1"></i> Vender</button>` : ''}
                        </div>
                    </div>`;
                    
                    if(exp) {
                        html += `<div class="bg-tinput p-4 border-t border-tborder space-y-4 transition-colors">`;
                        if(vens.length > 0) {
                            html += `<div class="space-y-2">`;
                            html += vens.map(v => `
                                <div class="flex justify-between items-center text-sm border-b border-tborder/50 pb-2">
                                    <div class="flex flex-col"><span class="font-semibold text-tmain">${v.doceNome}</span><span class="text-[10px] text-tmuted">${v.data}</span></div>
                                    <div class="flex items-center space-x-2"><span class="font-bold text-tmain">R$ ${fmtMoney(v.preco)}</span><button onclick="cancelarVenda('${v.id}', '${v.doceId}', '${v.doceNome}')" class="text-red-500 p-1"><i data-lucide="x" class="w-4 h-4"></i></button></div>
                                </div>
                            `).join('');
                            html += `</div>`;
                            html += `
                                <div class="flex justify-between items-end pt-2 border-t border-tborder">
                                    <div><p class="text-[10px] text-tmuted uppercase font-bold tracking-wider">Pendente</p><p class="text-xl font-black text-red-500">R$ ${fmtMoney(saldo)}</p></div>
                                    ${saldo > 0.01 ? `<button onclick="prepararPagamento('${c.id}', '${c.nome}', ${saldo})" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-all">Receber</button>` : ''}
                                </div>
                            `;
                        } else {
                            html += `<p class="text-xs text-tmuted text-center">Nenhuma dívida ativa.</p>`;
                        }
                        html += `</div>`;
                    }
                html += `</div>`;
                return html;
            }).join('');
            document.getElementById('resumo-lista').innerHTML = db.clientes.length === 0 ? `<div class="text-center text-tmuted p-6 bg-tcard rounded-xl border border-tborder">Nenhum cliente salvo.</div>` : resumoHTML;

            // 2. Render Clientes Directory
            document.getElementById('clientes-lista').innerHTML = db.clientes.map(c => `
                <div class="bg-tcard p-4 rounded-xl border border-tborder flex justify-between items-center shadow-sm transition-colors">
                    <div><p class="font-bold text-tmain">${c.nome}</p><p class="text-[10px] text-tmuted uppercase font-bold tracking-wide">${c.departamento}</p></div>
                    <div class="flex space-x-1">
                        <button onclick="prepararEdicaoCliente('${c.id}')" class="p-2 text-indigo-500 active:scale-90 transition-transform"><i data-lucide="edit-2" class="w-5 h-5"></i></button>
                        <button onclick="excluirCliente('${c.id}')" class="p-2 text-red-500 active:scale-90 transition-transform"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `).join('');

            // 3. Render Doces Directory
            document.getElementById('doces-lista').innerHTML = db.doces.map(d => `
                <div class="bg-tcard p-4 rounded-xl border border-tborder flex justify-between items-center shadow-sm transition-colors">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 rounded-lg ${d.estoque>0?'bg-indigo-500/10 text-indigo-500':'bg-slate-500/10 text-tmuted'}"><i data-lucide="candy" class="w-5 h-5"></i></div>
                        <div><p class="font-bold transition-colors ${d.estoque>0?'text-tmain':'text-tmuted line-through'}">${d.nome}</p><p class="text-xs text-tmuted font-bold uppercase tracking-wide">R$ ${fmtMoney(d.preco)} | ${d.estoque} un.</p></div>
                    </div>
                    <div class="flex space-x-1">
                        <button onclick="prepararEdicaoDoce('${d.id}')" class="p-2 text-indigo-500 active:scale-90 transition-transform"><i data-lucide="edit-2" class="w-5 h-5"></i></button>
                        <button onclick="excluirDoce('${d.id}')" class="p-2 text-red-500 active:scale-90 transition-transform"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `).join('');

            // 4. Render Caixa
            document.getElementById('caixa-total').innerText = `R$ ${fmtMoney(db.logsPagamentos.reduce((a,c)=>a+c.valor,0))}`;
            
            const agrupados = db.logsPagamentos.reduce((acc, log) => {
                if (!acc[log.clienteId]) acc[log.clienteId] = { nome: log.clienteNome || "Desconhecido", total: 0, logs: [] };
                acc[log.clienteId].total += log.valor;
                acc[log.clienteId].logs.push(log);
                return acc;
            }, {});

            const listaAgrupada = Object.entries(agrupados).sort((a,b) => a[1].nome.localeCompare(b[1].nome));

            let caixaHTML = '';
            if (listaAgrupada.length === 0) {
                caixaHTML = '<div class="text-center text-tmuted p-6 bg-tcard rounded-xl border border-tborder">Nenhum pagamento registrado.</div>';
            } else {
                caixaHTML = listaAgrupada.map(([cId, dados]) => {
                    const exp = caixaExpandidos.includes(cId);
                    let h = `
                    <div class="bg-tcard rounded-xl border border-tborder shadow-sm overflow-hidden transition-colors">
                        <div class="p-4 flex justify-between items-center cursor-pointer active:bg-slate-500/5 transition-colors" onclick="toggleCaixaExpandir('${cId}')">
                            <div class="flex-1">
                                <div class="flex items-center">
                                    <h4 class="font-bold text-tmain mr-2 text-lg">${dados.nome}</h4>
                                    <i data-lucide="${exp?'chevron-up':'chevron-down'}" class="w-4 h-4 ${exp?'text-emerald-500':'text-tmuted'}"></i>
                                </div>
                                <p class="text-[10px] text-tmuted font-bold uppercase tracking-wide mt-1">${dados.logs.length} registro${dados.logs.length > 1 ? 's' : ''}</p>
                            </div>
                            <div class="flex items-center"><span class="font-black text-emerald-500 text-lg">R$ ${fmtMoney(dados.total)}</span></div>
                        </div>`;
                        if(exp) {
                            h += `<div class="bg-tinput p-4 border-t border-tborder space-y-2 transition-colors">`;
                            h += dados.logs.sort((a,b)=>b.timestamp-a.timestamp).map(l => `
                                <div class="flex justify-between items-center text-sm border-b border-tborder/50 pb-2 last:border-b-0 last:pb-0 pt-1">
                                    <div class="flex flex-col"><span class="text-[10px] text-tmuted font-bold uppercase">${l.data} às ${l.hora}</span></div>
                                    <div class="flex items-center space-x-3"><span class="font-bold text-tmain">R$ ${fmtMoney(l.valor)}</span><button onclick="event.stopPropagation(); removerLogCaixa('${l.id}')" class="text-red-500 p-1 active:scale-90 transition-transform"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>
                                </div>
                            `).join('');
                            h += `</div>`;
                        }
                    h += `</div>`;
                    return h;
                }).join('');
            }
            document.getElementById('caixa-lista').innerHTML = caixaHTML;

            lucide.createIcons();
        }

        // --- INICIALIZAÇÃO ---
        renderAll();

        // SW PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                const scope = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                navigator.serviceWorker.register('sw.js', { scope: scope }).catch(()=>{});
            });
        }
    </script>
</body>
</html>
