<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Venda de Doces</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind para Temas Dinâmicos (Claro, Médio, Escuro) -->
    <style type="text/tailwindcss">
        @layer base {
            :root, .tema-claro {
                --bg-base: #f8fafc;
                --bg-card: #ffffff;
                --bg-input: #f1f5f9;
                --text-main: #0f172a;
                --text-muted: #64748b;
                --border-color: #e2e8f0;
            }
            .tema-medio {
                --bg-base: #0f172a;
                --bg-card: #1e293b;
                --bg-input: #0f172a;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border-color: #334155;
            }
            .tema-escuro {
                --bg-base: #020617;
                --bg-card: #09090b;
                --bg-input: #020617;
                --text-main: #f8fafc;
                --text-muted: #6b7280;
                --border-color: #1f2937;
            }
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tbase: 'var(--bg-base)',
                        tcard: 'var(--bg-card)',
                        tinput: 'var(--bg-input)',
                        tmain: 'var(--text-main)',
                        tmuted: 'var(--text-muted)',
                        tborder: 'var(--border-color)',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans selection:bg-indigo-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ICONS = {
            store: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>`,
            users: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            candy: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9.5 7.5-2 2a4.95 4.95 0 1 0 7 7l2-2a4.95 4.95 0 1 0-7-7Z"/><path d="M14 6.5v10"/><path d="M10 7.5v10"/><path d="m16 7 1-5 1.36.68A3 3 0 0 0 19.7 3h.3v.3a3 3 0 0 0-.68 1.34L20 6l-4 1Z"/><path d="m8 17-1 5-1.36-.68A3 3 0 0 0 4.3 21H4v-.3a3 3 0 0 0 .68-1.34L4 18l4-1Z"/></svg>`,
            history: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`,
            receipt: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></svg>`,
            'layout-dashboard': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>`,
            wallet: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>`,
            'shopping-cart': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`,
            phone: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
            'trash-2': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`,
            plus: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
            x: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            'check-circle-2': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
            'edit-2': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`,
            download: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>`,
            upload: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>`,
            'chevron-down': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            'chevron-up': `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`,
            database: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>`,
            settings: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
            sun: `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`
        };

        const Icon = ({ name, className }) => (
            <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: ICONS[name] }} />
        );

        function App() {
            // Inicialização Segura
            const safeLoad = (key, defaultVal) => {
                try { return JSON.parse(localStorage.getItem(key)) || defaultVal; } 
                catch (e) { return defaultVal; }
            };
            const safeLoadString = (key, defaultVal) => {
                try { return localStorage.getItem(key) || defaultVal; } 
                catch (e) { return defaultVal; }
            };

            const [tema, setTema] = useState(() => safeLoadString('g_doces_tema', 'claro'));
            const [clientes, setClientes] = useState(() => safeLoad('g_doces_clientes', []));
            const [doces, setDoces] = useState(() => safeLoad('g_doces_produtos', []));
            const [vendas, setVendas] = useState(() => safeLoad('g_doces_vendas', []));
            const [pagamentos, setPagamentos] = useState(() => safeLoad('g_doces_pagamentos', []));
            const [logsPagamentos, setLogsPagamentos] = useState(() => safeLoad('g_doces_logs', []));

            // Efeitos de Gravação e Atualização de Tema
            useEffect(() => {
                document.documentElement.classList.remove('tema-claro', 'tema-medio', 'tema-escuro');
                document.documentElement.classList.add(`tema-${tema}`);
                localStorage.setItem('g_doces_tema', tema);
            }, [tema]);

            useEffect(() => { localStorage.setItem('g_doces_clientes', JSON.stringify(clientes)); }, [clientes]);
            useEffect(() => { localStorage.setItem('g_doces_produtos', JSON.stringify(doces)); }, [doces]);
            useEffect(() => { localStorage.setItem('g_doces_vendas', JSON.stringify(vendas)); }, [vendas]);
            useEffect(() => { localStorage.setItem('g_doces_pagamentos', JSON.stringify(pagamentos)); }, [pagamentos]);
            useEffect(() => { localStorage.setItem('g_doces_logs', JSON.stringify(logsPagamentos)); }, [logsPagamentos]);

            const [abaAtiva, setAbaAtiva] = useState('resumo'); 
            const [modalVenda, setModalVenda] = useState({ aberto: false, clienteId: null, clienteNome: '' });
            const [doceSelecionado, setDoceSelecionado] = useState('');
            const [quantidadeVenda, setQuantidadeVenda] = useState(1);
            const [erroVenda, setErroVenda] = useState('');
            const [modalPagamento, setModalPagamento] = useState({ aberto: false, clienteId: null, clienteNome: '', totalDevido: 0 });
            const [valorPagamento, setValorPagamento] = useState('');
            
            const [editandoCliente, setEditandoCliente] = useState(null);
            const [editandoDoce, setEditandoDoce] = useState(null);
            
            const [modalAjustes, setModalAjustes] = useState(false);
            const [clientesExpandidos, setClientesExpandidos] = useState([]);
            
            const [novoCliente, setNovoCliente] = useState({ nome: '', departamento: '', whatsapp: '' });
            const [novoDoce, setNovoDoce] = useState({ nome: '', preco: '', estoque: '' });

            const [toast, setToast] = useState({ aberto: false, mensagem: '', tipo: 'success' });
            const [modalConfirm, setModalConfirm] = useState({ aberto: false, mensagem: '', onConfirm: null });

            const fileInputRef = useRef(null);

            const mostrarToast = (mensagem, tipo = 'success') => {
                setToast({ aberto: true, mensagem, tipo });
                setTimeout(() => setToast(t => ({ ...t, aberto: false })), 3000);
            };

            // Exportar / Importar
            const exportarDados = () => {
                const dados = { clientes, doces, vendas, pagamentos, logsPagamentos };
                const blob = new Blob([JSON.stringify(dados)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup_doces_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                mostrarToast("Backup exportado com sucesso!", "success");
            };

            const importarDados = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const dados = JSON.parse(e.target.result);
                        if (dados.clientes && dados.doces) {
                            setModalConfirm({
                                aberto: true,
                                mensagem: "Atenção: Isto irá substituir os dados atuais. Deseja continuar?",
                                onConfirm: () => {
                                    setClientes(dados.clientes || []);
                                    setDoces(dados.doces || []);
                                    setVendas(dados.vendas || []);
                                    setPagamentos(dados.pagamentos || []);
                                    setLogsPagamentos(dados.logsPagamentos || []);
                                    mostrarToast("Dados restaurados com sucesso!", "success");
                                    setModalConfirm({ aberto: false, mensagem: '', onConfirm: null });
                                }
                            });
                        } else { mostrarToast("Ficheiro inválido.", "erro"); }
                    } catch (error) { mostrarToast("Erro ao ler o ficheiro.", "erro"); }
                };
                reader.readAsText(file);
                event.target.value = ''; 
            };

            const gerarId = () => Date.now().toString(36) + Math.random().toString(36).substring(2, 9);

            // Lógica Clientes
            const adicionarCliente = (e) => {
                e.preventDefault();
                if (!novoCliente.nome || !novoCliente.departamento) return;
                setClientes([...clientes, { ...novoCliente, id: gerarId() }]);
                setNovoCliente({ nome: '', departamento: '', whatsapp: '' });
                mostrarToast("Cliente adicionado!", "success");
            };

            const atualizarCliente = (e) => {
                e.preventDefault();
                setClientes(clientes.map(c => c.id === editandoCliente.id ? editandoCliente : c));
                setEditandoCliente(null);
                mostrarToast("Cliente atualizado!", "success");
            };

            const removerCliente = (id) => {
                setModalConfirm({
                    aberto: true,
                    mensagem: "Apagar cliente e todo o seu histórico de dívidas?",
                    onConfirm: () => {
                        setClientes(prev => prev.filter(c => c.id !== id));
                        setVendas(prev => prev.filter(v => v.clienteId !== id));
                        setPagamentos(prev => prev.filter(p => p.clienteId !== id));
                        setModalConfirm({ aberto: false, mensagem: '', onConfirm: null });
                        mostrarToast("Cliente apagado.", "success");
                    }
                });
            };

            const toggleExpandirCliente = (id) => {
                setClientesExpandidos(prev => prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]);
            };

            // Lógica Doces/Estoque
            const adicionarDoce = (e) => {
                e.preventDefault();
                if (!novoDoce.nome || !novoDoce.preco || !novoDoce.estoque) return;
                const precoF = parseFloat(novoDoce.preco.toString().replace(',', '.'));
                const estqF = parseInt(novoDoce.estoque, 10);
                if (isNaN(precoF) || isNaN(estqF)) return;
                setDoces([...doces, { id: gerarId(), nome: novoDoce.nome, preco: precoF, estoque: estqF }]);
                setNovoDoce({ nome: '', preco: '', estoque: '' });
                mostrarToast("Produto adicionado!", "success");
            };

            const atualizarDoce = (e) => {
                e.preventDefault();
                const precoF = parseFloat(editandoDoce.preco.toString().replace(',', '.'));
                const estqF = parseInt(editandoDoce.estoque, 10);
                if (isNaN(precoF) || isNaN(estqF)) {
                    mostrarToast("Valores inválidos.", "erro");
                    return;
                }
                setDoces(doces.map(d => d.id === editandoDoce.id ? { ...editandoDoce, preco: precoF, estoque: estqF } : d));
                setEditandoDoce(null);
                mostrarToast("Produto atualizado!", "success");
            };

            const removerDoce = (id) => {
                setModalConfirm({
                    aberto: true,
                    mensagem: "Deseja apagar este produto do estoque?",
                    onConfirm: () => {
                        setDoces(prev => prev.filter(d => d.id !== id));
                        setModalConfirm({ aberto: false, mensagem: '', onConfirm: null });
                        mostrarToast("Produto apagado.", "success");
                    }
                });
            };

            // Lógica Vendas
            const abrirModalVenda = (clienteId, clienteNome) => {
                setModalVenda({ aberto: true, clienteId, clienteNome });
                setDoceSelecionado('');
                setQuantidadeVenda(1);
                setErroVenda('');
            };

            const registrarVenda = (e) => {
                e.preventDefault();
                setErroVenda('');
                const doce = doces.find(d => d.id === doceSelecionado);
                const qtd = parseInt(quantidadeVenda, 10);

                if (!doce) return;
                if (isNaN(qtd) || qtd <= 0) { setErroVenda("Quantidade inválida."); return; }
                if (doce.estoque < qtd) { setErroVenda(`Apenas ${doce.estoque} unidades disponíveis.`); return; }
                
                setDoces(doces.map(d => d.id === doce.id ? { ...d, estoque: d.estoque - qtd } : d));
                setVendas([...vendas, {
                    id: gerarId(), 
                    clienteId: modalVenda.clienteId, 
                    doceId: doce.id, 
                    doceNome: qtd > 1 ? `${qtd}x ${doce.nome}` : doce.nome, 
                    preco: doce.preco * qtd,
                    data: new Date().toLocaleDateString('pt-BR'), 
                    timestamp: Date.now() 
                }]);
                
                setModalVenda({ aberto: false, clienteId: null, clienteNome: '' });
                setDoceSelecionado('');
                setQuantidadeVenda(1);
                if (!clientesExpandidos.includes(modalVenda.clienteId)) setClientesExpandidos([...clientesExpandidos, modalVenda.clienteId]);
                mostrarToast("Venda registada!", "success");
            };

            const removerVenda = (vendaId, doceId) => {
                setModalConfirm({
                    aberto: true,
                    mensagem: "Cancelar venda e repor a quantidade no estoque?",
                    onConfirm: () => {
                        const vendaCancelada = vendas.find(v => v.id === vendaId);
                        if (vendaCancelada && doceId && doceId !== 'pagamento') {
                            let qtdRepor = 1;
                            const match = vendaCancelada.doceNome.match(/^(\d+)x\s/);
                            if (match) qtdRepor = parseInt(match[1], 10);
                            setDoces(prev => prev.map(d => d.id === doceId ? { ...d, estoque: d.estoque + qtdRepor } : d));
                        }
                        setVendas(prev => prev.filter(v => v.id !== vendaId));
                        setModalConfirm({ aberto: false, mensagem: '', onConfirm: null });
                        mostrarToast("Venda cancelada.", "success");
                    }
                });
            };

            // Lógica Pagamentos
            const confirmarPagamento = (e) => {
                e.preventDefault();
                const valorF = parseFloat(valorPagamento.toString().replace(',', '.'));
                if (isNaN(valorF) || valorF <= 0) return;

                const pid = gerarId();

                setLogsPagamentos([...logsPagamentos, {
                    id: pid, clienteId: modalPagamento.clienteId, clienteNome: modalPagamento.clienteNome, valor: valorF,
                    data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}), timestamp: Date.now()
                }]);

                if (valorF >= modalPagamento.totalDevido - 0.01) {
                    setVendas(vendas.filter(v => v.clienteId !== modalPagamento.clienteId));
                    setPagamentos(pagamentos.filter(p => p.clienteId !== modalPagamento.clienteId));
                } else {
                    setPagamentos([...pagamentos, {
                        id: pid, clienteId: modalPagamento.clienteId, valor: valorF, data: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now()
                    }]);
                }
                setModalPagamento({ aberto: false, clienteId: null, clienteNome: '', totalDevido: 0 });

                            setPagamentos(prev => {
                                if (prev.some(p => p.id === logId)) return prev.filter(p => p.id !== logId);

                                    const newP = [...prev];
                                    newP.splice(pIndex, 1);
                                    return newP;
                                }
                                return prev;

                                        return total + (saldo > 0 ? saldo : 0);

                                            <div className="p-3 bg-tcard rounded-full shadow-sm">
                                                <Icon name="wallet" className="w-6 h-6 text-red-500" />
                                            </div>
                                        </div>

                                        </li>
                                    ))}
                                </ul>
                            </div>

                                <div className="flex justify-between mb-2">
                                    <div className="bg-emerald-500/10 text-emerald-500 w-14 h-14 rounded-full flex items-center justify-center mb-4 border border-emerald-500/20"><Icon name="check-circle-2" className="w-[28px] h-[28px]" /></div>
                                    <button onClick={() => setModalPagamento({ aberto: false, clienteId: null, clienteNome: '', totalDevido: 0 })} className="text-tmuted bg-slate-500/10 hover:bg-slate-500/20 p-1.5 rounded-full focus:outline-none"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <h3 className="text-xl font-black mb-1 text-tmain">Receber Pagamento</h3>
                                <p className="text-sm text-tmuted mb-5">Pendente: <strong className="text-red-500">R$ {modalPagamento.totalDevido.toFixed(2)}</strong></p>
                                <form onSubmit={confirmarPagamento}>
                                    <input type="number" step="0.01" max={modalPagamento.totalDevido} required className="w-full p-3.5 text-2xl font-black rounded-lg bg-tinput border border-tborder mb-4 text-tmain focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-colors duration-300" value={valorPagamento} onChange={(e) => setValorPagamento(e.target.value)} />
                                    <button type="submit" className="w-full bg-emerald-500 hover:bg-emerald-600 text-white p-4 rounded-xl font-bold text-lg transition-colors">Confirmar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {editandoCliente && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-tcard rounded-2xl p-6 w-full max-w-sm border border-tborder shadow-2xl transition-colors duration-300">
                                <div className="flex justify-between items-center mb-5 border-b border-tborder pb-4">
                                    <h3 className="text-lg font-bold flex items-center text-tmain"><Icon name="edit-2" className="w-5 h-5 mr-2 text-indigo-500"/> Editar Cliente</h3>
                                    <button onClick={() => setEditandoCliente(null)} className="text-tmuted bg-slate-500/10 hover:bg-slate-500/20 p-1.5 rounded-full focus:outline-none"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <form onSubmit={atualizarCliente} className="space-y-4">
                                    <input type="text" required className="w-full p-3.5 rounded-xl bg-tinput border border-tborder text-tmain text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-300" value={editandoCliente.nome || ''} onChange={e => setEditandoCliente({...editandoCliente, nome: e.target.value})} />
                                    <input type="text" required className="w-full p-3.5 rounded-xl bg-tinput border border-tborder text-tmain text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-300" value={editandoCliente.departamento || ''} onChange={e => setEditandoCliente({...editandoCliente, departamento: e.target.value})} />
                                    <input type="tel" className="w-full p-3.5 rounded-xl bg-tinput border border-tborder text-tmain text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-300" value={editandoCliente.whatsapp || ''} onChange={e => setEditandoCliente({...editandoCliente, whatsapp: e.target.value})} />
                                    <button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-sm mt-2">Salvar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {editandoDoce && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-tcard rounded-2xl p-6 w-full max-w-sm border border-tborder shadow-2xl transition-colors duration-300">
                                <div className="flex justify-between items-center mb-5 border-b border-tborder pb-4">
                                    <h3 className="text-lg font-bold flex items-center text-tmain"><Icon name="edit-2" className="w-5 h-5 mr-2 text-indigo-500" /> Editar Produto</h3>
                                    <button onClick={() => setEditandoDoce(null)} className="text-tmuted bg-slate-500/10 hover:bg-slate-500/20 p-1.5 rounded-full focus:outline-none"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                <form onSubmit={atualizarDoce} className="space-y-4">
                                    <input type="text" required className="w-full p-3.5 rounded-xl bg-tinput border border-tborder text-tmain text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-300" value={editandoDoce.nome || ''} onChange={e => setEditandoDoce({...editandoDoce, nome: e.target.value})} />
                                    <div className="flex space-x-4">
                                        <input type="number" step="0.01" required className="w-1/2 p-3.5 rounded-xl bg-tinput border border-tborder text-tmain text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-300" value={editandoDoce.preco || ''} onChange={e => setEditandoDoce({...editandoDoce, preco: e.target.value})} />
                                        <input type="number" required className="w-1/2 p-3.5 rounded-xl bg-tinput border border-tborder text-tmain text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors duration-300" value={editandoDoce.estoque || ''} onChange={e => setEditandoDoce({...editandoDoce, estoque: e.target.value})} />
                                    </div>
                                    <button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-sm mt-2">Salvar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {modalAjustes && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-tcard rounded-2xl p-6 w-full max-w-sm border border-tborder shadow-2xl transition-colors duration-300">
                                <div className="flex justify-between items-center mb-5 border-b border-tborder pb-4">
                                    <h3 className="text-lg font-bold flex items-center text-tmain"><Icon name="settings" className="w-5 h-5 mr-2 text-indigo-500" /> Configurações</h3>
                                    <button onClick={() => setModalAjustes(false)} className="text-tmuted bg-slate-500/10 hover:bg-slate-500/20 p-1.5 rounded-full focus:outline-none"><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                
                                <div className="space-y-6">
                                    {/* Seção Tema */}
                                    <div>
                                        <h3 className="text-sm font-bold text-tmain uppercase tracking-wider mb-3 flex items-center transition-colors duration-300">
                                            <Icon name="sun" className="w-4 h-4 mr-2 text-amber-500"/> Tema Visual
                                        </h3>
                                        <div className="flex bg-tinput p-1 rounded-xl border border-tborder transition-colors duration-300">
                                            <button onClick={() => setTema('claro')} className={`flex-1 flex justify-center items-center py-2.5 rounded-lg text-sm font-bold transition-all ${tema === 'claro' ? 'bg-tcard text-indigo-600 shadow-sm border border-tborder' : 'text-tmuted hover:text-tmain'}`}>Claro</button>
                                            <button onClick={() => setTema('medio')} className={`flex-1 flex justify-center items-center py-2.5 rounded-lg text-sm font-bold transition-all ${tema === 'medio' ? 'bg-tcard text-indigo-400 shadow-sm border border-tborder' : 'text-tmuted hover:text-tmain'}`}>Médio</button>
                                            <button onClick={() => setTema('escuro')} className={`flex-1 flex justify-center items-center py-2.5 rounded-lg text-sm font-bold transition-all ${tema === 'escuro' ? 'bg-tcard text-indigo-400 shadow-sm border border-tborder' : 'text-tmuted hover:text-tmain'}`}>Escuro</button>
                                        </div>
                                    </div>

                                    {/* Seção Backup */}
                                    <div className="border-t border-tborder pt-6 space-y-4 transition-colors duration-300">
                                        <h3 className="text-sm font-bold text-tmain uppercase tracking-wider mb-2 flex items-center transition-colors duration-300">
                                            <Icon name="database" className="w-4 h-4 mr-2 text-indigo-500"/> Backup dos Dados
                                        </h3>
                                        <p className="text-sm text-tmuted font-medium mb-4 transition-colors duration-300">
                                            O aplicativo funciona offline. <strong>Exporte regularmente</strong> para não perder dados ao limpar o histórico do navegador.
                                        </p>
                                        <button onClick={exportarDados} className="w-full bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-500 p-4 rounded-xl font-bold text-sm flex justify-center items-center transition-colors border border-indigo-500/20 active:scale-95 shadow-sm">
                                            <Icon name="download" className="w-5 h-5 mr-2" /> Salvar Backup (Exportar)
                                        </button>
                                        <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={(e) => { importarDados(e); setModalAjustes(false); }} />
                                        <button onClick={() => fileInputRef.current.click()} className="w-full bg-slate-500/10 hover:bg-slate-500/20 text-tmain p-4 rounded-xl font-bold text-sm flex justify-center items-center transition-colors border border-tborder active:scale-95 shadow-sm">
                                            <Icon name="upload" className="w-5 h-5 mr-2" /> Restaurar Backup (Importar)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONFIRMAÇÃO GENÉRICA (Substitui o window.confirm) */}
                    {modalConfirm.aberto && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                            <div className="bg-tcard rounded-2xl p-6 w-full max-w-sm border border-tborder shadow-2xl transition-colors duration-300">
                                <div className="mx-auto bg-red-500/10 text-red-500 w-14 h-14 rounded-full flex items-center justify-center mb-4 border border-red-500/20">
                                    <Icon name="alert-circle" className="w-[28px] h-[28px]" />
                                </div>
                                <h3 className="text-xl font-bold text-center text-tmain mb-2">Atenção</h3>
                                <p className="text-sm text-center text-tmuted mb-6">{modalConfirm.mensagem}</p>
                                <div className="flex space-x-3">
                                    <button onClick={() => setModalConfirm({ aberto: false, mensagem: '', onConfirm: null })} className="flex-1 bg-slate-500/10 hover:bg-slate-500/20 text-tmain p-3.5 rounded-xl font-bold transition-colors">Cancelar</button>
                                    <button onClick={modalConfirm.onConfirm} className="flex-1 bg-red-500 hover:bg-red-600 text-white p-3.5 rounded-xl font-bold transition-colors shadow-md">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TOAST NOTIFICAÇÃO */}
                    {toast.aberto && (
                        <div className={`fixed top-4 right-4 px-4 py-3 rounded-xl shadow-lg z-[100] text-white flex items-center transition-all duration-300 ${toast.tipo === 'erro' ? 'bg-red-500' : 'bg-emerald-500'}`}>
                            <Icon name={toast.tipo === 'erro' ? 'alert-circle' : 'check-circle-2'} className="w-5 h-5 mr-2" />
                            <span className="font-medium text-sm">{toast.mensagem}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
